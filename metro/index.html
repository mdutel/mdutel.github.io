<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan vierge — Métro de Paris</title>
<style>
  :root{
    --bg: #0d1117;
    --panel: #f7f5ef;
    --panel-line: #1a1a1a;
    --ink: #14140f;
    --muted: #6b6b63;
    --ok: #2f8f5b;
    --bad: #c1453a;
    --review: #E8A33D;
    --accent: #f7f5ef;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--accent);
    font-family: "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 24px 14px 60px;
  }
  .wrap{ width:100%; max-width: 1320px; }

  /* header */
  .masthead{
    display:flex; align-items:baseline; justify-content:space-between;
    border-bottom: 3px solid var(--accent);
    padding-bottom: 10px; margin-bottom: 18px;
  }
  .masthead h1{
    font-size: 15px; letter-spacing: 0.18em; text-transform:uppercase;
    font-weight: 700; margin:0;
  }
  .masthead .sub{
    font-size: 11px; letter-spacing: 0.1em; color:#9a9a92; text-transform:uppercase;
  }

  /* line tabs — RATP-style number badges, one row, no wrap, evenly filling the row */
  .tabs{ display:flex; gap:6px; margin-bottom:14px; flex-wrap:nowrap; overflow-x:auto; padding:4px 2px; }
  .tabs::-webkit-scrollbar{ height:6px; }
  .tabs::-webkit-scrollbar-thumb{ background:#2a313c; border-radius:3px; }
  .tab-card{
    flex:1 1 0; min-width:40px; padding:4px; border-radius:12px;
    display:flex; align-items:center; justify-content:center;
  }
  .tab-card.active{ background:#f7f5ef; box-shadow:0 2px 8px rgba(0,0,0,0.35); }
  .tab-badge{
    width:100%; max-width:60px; aspect-ratio:1/1; border:none; border-radius:50%; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:1px;
    font-weight:800; transition: transform .1s;
  }
  .tab-badge .num{ font-size:22px; line-height:1; }
  .tab-badge .bis{ font-size:11px; line-height:1; align-self:flex-end; margin-bottom:3px; }
  .tab-badge:active{ transform: scale(0.92); }

  /* mode toggle */
  .modes{ display:flex; gap:8px; margin-bottom:20px; }
  .mode-btn{
    flex:1; background:#1c2128; color:#cfd3da; border:1px solid #2a313c;
    padding:10px 12px; border-radius:8px; font-size:12px; letter-spacing:0.05em;
    text-transform:uppercase; font-weight:700; cursor:pointer;
  }
  .mode-btn.active{ background:#cfd3da; color:#11151a; border-color:#cfd3da; }

  /* options row (correspondence mode segmented control) */
  .opts-row{ display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
  .opts-label{ font-size:12px; letter-spacing:0.04em; color:#cfd3da; font-weight:700; text-transform:uppercase; }
  .seg{ display:inline-flex; border:1px solid #2a313c; border-radius:8px; overflow:hidden; }
  .seg button{
    background:#1c2128; color:#aeb4bd; border:none; cursor:pointer;
    padding:8px 14px; font-size:12px; font-weight:700; letter-spacing:0.03em;
    border-right:1px solid #2a313c;
  }
  .seg button:last-child{ border-right:none; }
  .seg button.active{ background:#6FCB9F; color:#0d1117; }

  /* top navigation between views + data tools */
  .nav{ display:flex; align-items:center; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
  .nav .nav-btn{
    background:#1c2128; color:#cfd3da; border:1px solid #2a313c; cursor:pointer;
    padding:9px 15px; font-size:12px; font-weight:700; letter-spacing:0.04em; border-radius:8px;
    text-transform:uppercase;
  }
  .nav .nav-btn.active{ background:#cfd3da; color:#11151a; border-color:#cfd3da; }
  .nav .nav-btn.review{ background:#E8A33D; color:#1a1205; border-color:#E8A33D; }
  .nav .nav-btn.review.active{ background:#E8A33D; color:#1a1205; box-shadow:0 0 0 2px rgba(232,163,61,0.4); }
  .nav .nav-btn:disabled{ opacity:0.4; cursor:default; }
  .nav .nav-sep{ flex:1; }
  .nav .nav-btn.ghost{ background:transparent; color:#8d939b; text-transform:none; letter-spacing:0; font-weight:600; padding:9px 10px; }

  .review-banner{ margin-bottom:12px; }
  .review-banner .pill{
    display:inline-block; background:#E8A33D; color:#1a1205; font-weight:800;
    font-size:11px; letter-spacing:0.06em; text-transform:uppercase; padding:5px 11px; border-radius:999px;
  }

  /* flagged ("à réviser") marker on the plan */
  .stop.flagged .dot{ outline:2px solid var(--review); outline-offset:2px; }

  /* line badge (review cards + history) */
  .line-badge{
    display:inline-flex; align-items:center; justify-content:center; min-width:22px; height:22px;
    border-radius:50%; font-size:12px; font-weight:800; padding:0 5px;
  }

  /* history list */
  .hist-wrap{ }
  .hist-row{
    display:flex; align-items:center; gap:12px; padding:10px 4px; border-bottom:1px solid #e4e0d3;
    font-size:13px; color:var(--ink);
  }
  .hist-row .when{ color:var(--muted); font-size:11px; min-width:104px; }
  .hist-row .meta{ flex:1; color:var(--muted); }
  .hist-row .pct{ font-weight:800; font-size:15px; }
  .hist-empty{ color:var(--muted); text-align:center; padding:30px 10px; font-size:14px; }

  /* sign panel */
  .panel{
    background: var(--panel); color: var(--ink);
    border-radius: 6px; padding: 18px 16px 22px;
    box-shadow: 0 18px 40px -16px rgba(0,0,0,0.6);
    margin-bottom: 18px;
  }
  .panel-head{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;
  }
  .panel-head .terminus{
    font-weight:800; text-transform:uppercase; font-size:13px; letter-spacing:0.02em;
  }
  .panel-head .arrow{ color:var(--muted); font-size:12px; }

  .strip-scroll{ padding-bottom: 6px; }
  .strip{
    position:relative; display:flex; align-items:flex-start; justify-content:space-between;
    width: 100%; padding: 160px 60px 58px 12px;
  }
  .strip .spine{
    position:absolute; left:34px; right:60px; top: 160px;
    height: 6px; transform: translateY(-50%);
    border-radius: 3px; z-index:0;
  }
  .stop{
    position:relative; z-index:1; flex: 1 1 0; min-width:0; height:0;
  }
  /* dot centered exactly on the line (top:0 of .stop == spine level) */
  .stop .dot{
    position:absolute; top:0; left:50%; transform:translate(-50%,-50%);
    width:14px; height:14px; border-radius:50%; background:#fff; box-sizing:border-box;
    border: 3px solid #cfcabb;
  }
  .stop.hub .dot{ width:26px; height:26px; border-width:4px; }
  .stop.current .dot{ box-shadow: 0 0 0 5px rgba(0,0,0,0.10); }
  /* RATP-style labels: bold, blue, ascending diagonally (33° from horizontal).
     Anchored with `bottom` (not `top`) so the rotation pivot — and thus the
     baseline height — stays identical whether or not the terminus banner's
     padding is applied. */
  .stop .label{
    position:absolute; bottom:30px; left:50%;
    transform: rotate(-33deg); transform-origin: left bottom;
    white-space: nowrap; font-size: 11px; line-height:1;
    color:var(--muted); font-weight:600;
  }
  .stop.done .label{ color: #1a4fa0; font-weight: 800; }
  /* terminus stations: white text on a blue ribbon, like the real RATP diagrams */
  .stop.terminus.done .label{
    background:#1a4fa0; color:#fff; padding:3px 7px; border-radius:3px;
  }
  /* correspondences stacked BELOW the line: metro row, then RER/tram row.
     Top offset matches the label's bottom offset for a symmetric look. */
  .stop .corr-wrap{
    position:absolute; top:30px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:2px; width:66px;
  }
  .corr-line{ display:flex; gap:3px; flex-wrap:wrap; justify-content:center; }

  /* ---------- Forked-line strip (line 13): two stacked friezes + connector ---------- */
  /* Unlike .strip (which stretches to fill the panel), fork friezes use a fixed
     per-station width and a horizontally scrollable wrapper, since the two rows
     need a shared, predictable coordinate system to align the connector. */
  .fork-wrap{ overflow-x:auto; padding-bottom:6px; }
  .fork-inner{ position:relative; }
  /* fork direction: forkSide "left" reverses the row (trunk[0] at far right,
     branches extend leftward — line 13); "right" keeps normal order (trunk[0]
     at far left, branches extend rightward — line 7). Matches each RATP plan. */
  .fstrip{
    position:relative; display:flex; align-items:flex-start;
    padding: 160px 12px 58px 12px;
  }
  .fork-inner.fork-left .fstrip{ flex-direction:row-reverse; }
  .fork-inner.fork-right .fstrip{ flex-direction:row; }
  /* spine position (left/width) is set at runtime so the line runs exactly
     between the first and last REAL dots of each row (no orphan segment, and
     jointive with the end dots) */
  .fstrip .spine{
    position:absolute; top:160px;
    height:6px; transform:translateY(-50%); border-radius:3px; z-index:0;
  }
  .fstop{ position:relative; z-index:1; flex:0 0 46px; width:46px; min-width:0; height:0; }
  .fstop .dot{
    position:absolute; top:0; left:50%; transform:translate(-50%,-50%);
    width:14px; height:14px; border-radius:50%; background:#fff; box-sizing:border-box;
    border: 3px solid #cfcabb;
  }
  .fstop.hub .dot, .fstop.fork .dot{ width:26px; height:26px; border-width:4px; }
  .fstop.current .dot{ box-shadow: 0 0 0 5px rgba(0,0,0,0.10); }
  .fstop .label{
    position:absolute; bottom:30px; left:50%;
    transform: rotate(-33deg); transform-origin: left bottom;
    white-space: nowrap; font-size: 11px; line-height:1;
    color:var(--muted); font-weight:600;
  }
  .fstop.done .label{ color: #1a4fa0; font-weight: 800; }
  .fstop.terminus.done .label{
    background:#1a4fa0; color:#fff; padding:3px 7px; border-radius:3px;
  }
  .fstop .corr-wrap{
    position:absolute; top:30px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:2px; width:66px;
  }
  .fstop.slot{ cursor:pointer; }
  .fstop.slot .dot{ border-style:dashed; }
  .fstop.slot.target .dot{ border-color: var(--ink); }
  .fstop.slot.wrong-flash .dot{ background: var(--bad); border-color: var(--bad); }
  .fstop.flagged .dot{ outline:2px solid var(--review); outline-offset:2px; }
  /* diagonal connector at the fork, positioned + rotated at runtime */
  .fork-diag{ position:absolute; height:6px; transform-origin:left center; border-radius:3px; z-index:0; }
  .corr-chip-mini{
    font-size:8px; font-weight:800; color:#fff; border-radius:3px; padding:1px 3px; line-height:1.3;
  }
  /* loop line (line 10): one-way direction captions on each arc */
  .loop-cap{
    position:absolute; transform:translate(-50%,-50%); white-space:nowrap; z-index:2;
    font-size:10px; font-weight:800; letter-spacing:0.02em; color:#8a6d1e;
    background:#fbf4dd; border:1px solid #e6d59a; border-radius:10px; padding:2px 8px;
  }
  .fstrip-mid .spine{ /* two segments positioned at runtime (west + east trunk) */ }

  /* question card */
  .qcard{ margin-top:6px; }
  .qcard .qlabel{
    font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted);
    font-weight:700; margin-bottom:8px;
  }
  .qcard input[type=text]{
    width:100%; padding:12px 14px; font-size:16px; border-radius:6px;
    border: 2px solid #d8d4c4; font-family:inherit; background:#fff;
  }
  .qcard input[type=text]:focus{ outline:none; border-color:#14140f; }
  .row-btn{ display:flex; gap:8px; margin-top:10px; }
  .btn{
    border:none; cursor:pointer; padding:11px 18px; border-radius:6px;
    font-weight:700; font-size:13px; letter-spacing:0.03em;
  }
  .btn-primary{ background: var(--ink); color:#fff; }
  .btn-secondary{ background:transparent; color:var(--ink); text-decoration:underline; padding-left:0; }
  .feedback{ margin-top:10px; font-weight:700; font-size:13px; }
  .feedback.ok{ color: var(--ok); }
  .feedback.bad{ color: var(--bad); }

  /* word bank for melange mode */
  .bank-filter{
    width:100%; padding:10px 12px; font-size:14px; border-radius:6px; margin-top:8px;
    border: 2px solid #d8d4c4; font-family:inherit; background:#fff;
  }
  .bank-filter:focus{ outline:none; border-color:#14140f; }
  .bank{ display:flex; flex-wrap:wrap; gap:6px; margin-top:12px; }
  .chip{
    background:#fff; border:2px solid #d8d4c4; padding:8px 12px; border-radius:6px;
    font-size:12px; font-weight:700; cursor:pointer; color:var(--ink);
  }
  .chip.selected{ border-color:var(--ink); background:#ece8db; }
  .chip:disabled{ opacity:0.3; cursor:default; }

  .stop.slot{ cursor:pointer; }
  .stop.slot .dot{ border-style:dashed; }
  .stop.slot.target .dot{ border-color: var(--ink); }
  .stop.slot.wrong-flash .dot{ background: var(--bad); border-color: var(--bad); }

  /* correspondance chips for picking lines */
  .corr-options{ display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  .corr-opt{
    border:2px solid #d8d4c4; background:#fff; color:var(--ink);
    padding:7px 11px; border-radius:6px; font-size:12px; font-weight:800; cursor:pointer;
    display:inline-flex; align-items:center; gap:6px;
  }
  .corr-swatch{ width:11px; height:11px; border-radius:50%; display:inline-block; flex-shrink:0; box-shadow: 0 0 0 1px rgba(0,0,0,0.12) inset; }
  .corr-opt.selected{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .corr-opt.correct{ background:var(--ok); color:#fff; border-color:var(--ok); }
  .corr-opt.missed{ background:#fff; color:var(--bad); border-color:var(--bad); border-style:dashed; }
  .corr-opt.extra{ background:var(--bad); color:#fff; border-color:var(--bad); text-decoration:line-through; }

  .score{
    display:flex; flex-wrap:wrap; gap:6px 22px; font-size:12px; color:#9a9a92;
    text-transform:uppercase; letter-spacing:0.05em; font-weight:700; margin-bottom:10px;
  }
  .score b{ color:#fff; }

  .done-screen{ text-align:center; padding: 20px 8px; }
  .done-screen .big{ font-size:34px; font-weight:800; margin:6px 0; }
  .note{ font-size:12px; color:#8d8d85; line-height:1.5; margin-top:14px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <h1><a href="../" style="color:inherit;text-decoration:none">Plan vierge</a></h1>
    <div class="sub"><a href="../" style="color:#9a9a92;text-decoration:none">← Accueil</a> · Métro de Paris — pilote</div>
  </div>

  <div class="nav" id="nav"></div>

  <div id="trainChrome">
    <div class="tabs" id="tabs"></div>
    <div class="modes" id="modes"></div>
    <div class="opts-row" id="optsRow"></div>
    <div class="review-banner" id="reviewBanner"></div>
    <div class="score" id="scorebar"></div>
  </div>

  <div class="panel" id="panel"></div>

  <div class="note" id="note"></div>
</div>

<script>
const LINES = {
  "7": {
    color: "#FA9ABA",
    name: "Ligne 7",
    forkSide: "right",  // La Courneuve at left, fork (Maison Blanche) & branches at right — matches the RATP plan
    // trunk: shared by every train, from the northern terminus (La Courneuve)
    // down to and including the fork station (Maison Blanche).
    trunk: [
      {n:"La Courneuve - 8 Mai 1945", c:["T1"]},
      {n:"Fort d'Aubervilliers", c:[]},
      {n:"Aubervilliers - Pantin - Quatre Chemins", c:[]},
      {n:"Porte de la Villette", c:["T3b"]},
      {n:"Corentin Cariou", c:[]},
      {n:"Crimée", c:[]},
      {n:"Riquet", c:[]},
      {n:"Stalingrad", c:["2","5"]},
      {n:"Louis Blanc", c:["7bis"]},
      {n:"Château-Landon", c:[]},
      {n:"Gare de l'Est", c:["4","5","RER E"]},
      {n:"Poissonnière", c:[]},
      {n:"Cadet", c:[]},
      {n:"Le Peletier", c:[]},
      {n:"Chaussée d'Antin - La Fayette", c:["9"]},
      {n:"Opéra", c:["3","8","RER A"]},
      {n:"Pyramides", c:["14"]},
      {n:"Palais Royal - Musée du Louvre", c:["1"]},
      {n:"Pont Neuf", c:[]},
      {n:"Châtelet", c:["1","4","11","14","RER A","RER B","RER D"]},
      {n:"Pont Marie", c:[]},
      {n:"Sully - Morland", c:[]},
      {n:"Jussieu", c:["10"]},
      {n:"Place Monge", c:[]},
      {n:"Censier - Daubenton", c:[]},
      {n:"Les Gobelins", c:[]},
      {n:"Place d'Italie", c:["5","6"]},
      {n:"Tolbiac", c:[]},
      {n:"Maison Blanche", c:["14","T3a"]}
    ],
    branches: {
      A: {
        key:"A", label:"Branche Mairie d'Ivry", terminus:"Mairie d'Ivry",
        stations: [
          {n:"Porte d'Italie", c:["T3a"]},
          {n:"Porte de Choisy", c:["T3a"]},
          {n:"Porte d'Ivry", c:["T3a"]},
          {n:"Pierre et Marie Curie", c:[]},
          {n:"Mairie d'Ivry", c:["RER C"]}
        ]
      },
      B: {
        key:"B", label:"Branche Villejuif", terminus:"Villejuif - Louis Aragon",
        stations: [
          {n:"Le Kremlin-Bicêtre", c:[]},
          {n:"Villejuif - Léo Lagrange", c:[]},
          {n:"Villejuif - Paul Vaillant-Couturier", c:[]},
          {n:"Villejuif - Louis Aragon", c:["T7"]}
        ]
      }
    },
    get stations(){
      return this.trunk.concat(this.branches.A.stations, this.branches.B.stations);
    }
  },
  "13": {
    color: "#6EC4E8",
    name: "Ligne 13",
    forkSide: "left",  // Châtillon at right, fork (La Fourche) & branches at left — matches the RATP plan
    // trunk: shared by every train, from the southern terminus up to and
    // including the fork station (La Fourche).
    trunk: [
      {n:"Châtillon - Montrouge", c:["T6"]},
      {n:"Malakoff - Rue Étienne Dolet", c:[]},
      {n:"Malakoff - Plateau de Vanves", c:[]},
      {n:"Porte de Vanves", c:["T3a"]},
      {n:"Plaisance", c:[]},
      {n:"Pernety", c:[]},
      {n:"Gaîté", c:[]},
      {n:"Montparnasse - Bienvenüe", c:["4","6","12"]},
      {n:"Duroc", c:["10"]},
      {n:"Saint-François-Xavier", c:[]},
      {n:"Varenne", c:[]},
      {n:"Invalides", c:["8","RER C"]},
      {n:"Champs-Élysées - Clemenceau", c:["1"]},
      {n:"Miromesnil", c:["9"]},
      {n:"Saint-Lazare", c:["3","12","14","RER E"]},
      {n:"Liège", c:[]},
      {n:"Place de Clichy", c:["2"]},
      {n:"La Fourche", c:[]}
    ],
    branches: {
      A: {
        key:"A", label:"Branche Saint-Denis", terminus:"Saint-Denis - Université",
        stations: [
          {n:"Guy Môquet", c:[]},
          {n:"Porte de Saint-Ouen", c:[]},
          {n:"Garibaldi", c:[]},
          {n:"Mairie de Saint-Ouen", c:["14"]},
          {n:"Carrefour Pleyel", c:[]},
          {n:"Saint-Denis - Porte de Paris", c:["RER D","T8"]},
          {n:"Basilique de Saint-Denis", c:["T1"]},
          {n:"Saint-Denis - Université", c:[]}
        ]
      },
      B: {
        key:"B", label:"Branche Asnières", terminus:"Asnières - Gennevilliers - Les Courtilles",
        stations: [
          {n:"Brochant", c:[]},
          {n:"Porte de Clichy", c:["14","RER C","T3b"]},
          {n:"Mairie de Clichy", c:[]},
          {n:"Gabriel Péri", c:[]},
          {n:"Les Agnettes", c:[]},
          {n:"Asnières - Gennevilliers - Les Courtilles", c:["T1"]}
        ]
      }
    },
    // canonical full station list: trunk, then branch A, then branch B, in that
    // fixed order. Every index used by training/state (results, named, placed,
    // due-stations, etc.) refers to a position in THIS array. The two-frieze
    // strip renderer (renderForkStrip) maps these same indices onto its two
    // visual rows, so nothing about the underlying training logic needs to
    // know that the line forks.
    get stations(){
      return this.trunk.concat(this.branches.A.stations, this.branches.B.stations);
    }
  },
  "3": {
    color: "#837902",
    name: "Ligne 3",
    stations: [
      {n:"Pont de Levallois - Bécon", c:[]},
      {n:"Anatole France", c:[]},
      {n:"Louise Michel", c:[]},
      {n:"Porte de Champerret", c:["T3b"]},
      {n:"Pereire", c:["RER C"]},
      {n:"Wagram", c:[]},
      {n:"Malesherbes", c:[]},
      {n:"Villiers", c:["2"]},
      {n:"Europe", c:[]},
      {n:"Saint-Lazare", c:["12","13","14","RER E"]},
      {n:"Havre - Caumartin", c:["9","RER A"]},
      {n:"Opéra", c:["7","8","RER A"]},
      {n:"Quatre-Septembre", c:[]},
      {n:"Bourse", c:[]},
      {n:"Sentier", c:[]},
      {n:"Réaumur - Sébastopol", c:["4"]},
      {n:"Arts et Métiers", c:["11"]},
      {n:"Temple", c:[]},
      {n:"République", c:["5","8","9","11"]},
      {n:"Parmentier", c:[]},
      {n:"Rue Saint-Maur", c:[]},

// ---------- Forked-line helpers (line 13: trunk + two northern branches) ----------
// LINES[key].stations is a getter for such lines: trunk + whichever branch is
// currently trained (they always cover trunk + every branch). That covers almost every call site in the
// app for free, since they all just want "the line currently being trained".
// A handful of call sites genuinely need every station regardless of branch
// (stats, due-for-review, and the "show every line" map trace) — they use
// lineAllStations() instead.
function lineAllStations(lineKey){
  const L = LINES[lineKey];
  if(!L.branches) return L.stations;
  const seen = new Set(); const out = [];
  L.trunk.forEach(s=>{ if(!seen.has(s.n)){ seen.add(s.n); out.push(s); } });
  Object.keys(L.branches).forEach(bk=>{
    L.branches[bk].stations.forEach(s=>{ if(!seen.has(s.n)){ seen.add(s.n); out.push(s); } });
  });
  return out;
}
// which branch (if any) a given station name belongs to on a forked line
function branchKeyOfStation(lineKey, name){
  const L = LINES[lineKey];
  if(!L.branches) return null;
  for(const bk in L.branches){ if(L.branches[bk].stations.some(s=>s.n===name)) return bk; }
  return null; // lives on the trunk
}
// trunk + whichever branch actually contains this station (used by the review
// mini-strip, which must render the right branch for a due station regardless
// of which branch happens to be selected in the training tab right now)
function contextStationsForName(lineKey, name){
  const L = LINES[lineKey];
  if(!L.branches) return L.stations;
  const bk = branchKeyOfStation(lineKey, name) || Object.keys(L.branches)[0];
  return L.trunk.concat(L.branches[bk].stations);
}

/* ---------- Map module (geographic mode) ---------- */
const MAP = (function(){
  // gather all coords ([lng,lat]) to compute bounds
  const pts = [];
  Object.values(GEO.stations).forEach(p=>pts.push(p));
  GEO.arr.forEach(a=>a.ring.forEach(p=>pts.push(p)));
  GEO.water.forEach(r=>r.forEach(p=>pts.push(p)));
  let minLng=Infinity,maxLng=-Infinity,minLat=Infinity,maxLat=-Infinity;
  pts.forEach(([lng,lat])=>{ if(lng<minLng)minLng=lng; if(lng>maxLng)maxLng=lng; if(lat<minLat)minLat=lat; if(lat>maxLat)maxLat=lat; });
  const lat0=(minLat+maxLat)/2;
  const kx=Math.cos(lat0*Math.PI/180);
  const pad=22, W=1000;
  const spanX=(maxLng-minLng)*kx, spanY=(maxLat-minLat);
  const scale=(W-2*pad)/spanX;
  const H=spanY*scale+2*pad;
  function project(lng,lat){ return [pad+(lng-minLng)*kx*scale, pad+(maxLat-lat)*scale]; }
  function unproject(x,y){ return [minLng+(x-pad)/(kx*scale), maxLat-(y-pad)/scale]; }
  function haversine(lng1,lat1,lng2,lat2){
    const R=6371000, toR=Math.PI/180;
    const dLat=(lat2-lat1)*toR, dLng=(lng2-lng1)*toR;
    const a=Math.sin(dLat/2)**2 + Math.cos(lat1*toR)*Math.cos(lat2*toR)*Math.sin(dLng/2)**2;
    return 2*R*Math.asin(Math.sqrt(a));
  }
  return {W,H,project,unproject,haversine};
})();

function ringPath(ring){
  return ring.map((p,i)=>{ const [x,y]=MAP.project(p[0],p[1]); return (i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1); }).join('')+'Z';
}

const LS_KEY = "plan-vierge-metro-v1";
let STORE = { version: 4, stats: {}, games: [] };  // stats[line][station]={misses,attempts,box,due,lastSeen}

// Leitner boxes: index = box number, value = interval in days before next due
const SR_INTERVALS = [0, 1, 3, 7, 16, 35];  // box 1→1d, 2→3d, 3→7d, 4→16d, 5→35d
const SR_MAXBOX = 5;
const DAY_MS = 24*60*60*1000;
function nextDue(box){ return Date.now() + SR_INTERVALS[box]*DAY_MS; }

function loadStore(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ const d = JSON.parse(raw); if(d && d.stats) STORE = d; }
  }catch(e){ /* localStorage unavailable (e.g. in-app preview): keep in-memory STORE */ }
  STORE.stats = STORE.stats || {};
  STORE.games = STORE.games || [];
  // migrate legacy shapes forward to per-channel schedules {name:{box,due}, map:{box,due}}
  Object.keys(STORE.stats).forEach(line=>{
    Object.keys(STORE.stats[line]).forEach(name=>{
      const st = STORE.stats[line][name];
      if(st.box !== undefined){                 // v3 flat schedule → name channel
        st.name = {box: st.box||0, due: st.due||0};
        st.map = {box:0, due:0};
        delete st.box; delete st.due;
      } else if(st.flagged !== undefined){       // very old flagged flag
        st.name = {box: st.flagged?1:0, due: st.flagged?Date.now():0};
        st.map = {box:0, due:0};
        delete st.flagged;
      }
      if(!st.name) st.name = {box:0, due:0};
      if(!st.map)  st.map  = {box:0, due:0};
    });
  });
  STORE.version = 4;
}
function saveStore(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(STORE)); }catch(e){ /* no-op if blocked */ }
}
function getStat(line, name){
  const s = STORE.stats[line] && STORE.stats[line][name];
  if(s){ if(!s.name) s.name={box:0,due:0}; if(!s.map) s.map={box:0,due:0}; return s; }
  return {misses:0, attempts:0, lastSeen:0, name:{box:0,due:0}, map:{box:0,due:0}};
}
function setStat(line, name, st){
  STORE.stats[line] = STORE.stats[line] || {};
  STORE.stats[line][name] = st;
}
function schedOf(line, name, ch){
  const s = STORE.stats[line] && STORE.stats[line][name];
  return (s && s[ch]) || {box:0, due:0};
}
// "scheduled" in a given channel (or either, if ch omitted) = box >= 1
function isScheduled(line, name, ch){
  const s = STORE.stats[line] && STORE.stats[line][name];
  if(!s) return false;
  if(ch) return (s[ch] && s[ch].box>=1);
  return ((s.name&&s.name.box>=1) || (s.map&&s.map.box>=1));
}
function scheduledStations(line, ch){
  const m = STORE.stats[line] || {};
  return Object.keys(m).filter(n => ch ? ((m[n][ch]&&m[n][ch].box>=1)) : (( m[n].name&&m[n].name.box>=1)||(m[n].map&&m[n].map.box>=1)) );
}
// stations due now in a channel (box>=1 && due<=now), across every line
function dueStations(ch){
  const now = Date.now();
  const out = [];
  Object.keys(LINES).forEach(line=>{
    const m = STORE.stats[line] || {};
    lineAllStations(line).forEach(s=>{
      const st = m[s.n]; const sc = st && st[ch];
      if(sc && (sc.box||0) >= 1 && (sc.due||0) <= now) out.push({line, name:s.n});
    });
  });
  return out;
}
// update a station's stats + Leitner schedule in one channel, from a grade
// grade: 'clean' (promote / stay out), 'hold' (keep box, reschedule), 'miss' (schedule / reset to box 1)
function applyGrade(line, name, grade, ch, missesInc){
  const st = getStat(line, name);
  const sc = st[ch] || {box:0, due:0};
  let box = sc.box || 0;
  if(grade==='clean'){ if(box>=1) box = box + 1; }        // box 0 stays out of schedule
  else if(grade==='hold'){ /* box unchanged */ }
  else if(grade==='miss'){ box = 1; }                     // enter / reset remediation
  let due = 0;
  if(box > SR_MAXBOX){ box = 0; due = 0; }                // graduated
  else if(box >= 1){ due = nextDue(box); }
  st[ch] = {box, due};
  st.misses = (st.misses||0) + (missesInc||0);
  st.attempts = (st.attempts||0) + 1;
  st.fails = (st.fails||0) + (grade==='miss' ? 1 : 0);
  st.lastSeen = Date.now();
  setStat(line, name, st);
  saveStore();
}
// name modes (nomme / place): clean if first try, else miss — on the 'name' channel
function recordStation(idx){
  const r = state.results[idx];
  if(r.stationCorrect !== true && !r.revealed) return;
  const firstTry = r.stationCorrect===true && (r.wrongAttempts||0)===0 && !r.revealed;
  const grade = firstTry ? 'clean' : 'miss';
  const missesInc = (r.wrongAttempts||0) + (r.revealed?1:0);
  applyGrade(state.lineKey, LINES[state.lineKey].stations[idx].n, grade, 'name', missesInc);
}

function importHistory(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const d = JSON.parse(reader.result);

function mergeStore(d){
  STORE.stats = STORE.stats || {}; STORE.games = STORE.games || [];
  const chMerge=(cur,inc)=>{
    const newer = (inc && inc.lastSeen||0) >= (cur && cur.lastSeen||0);
    return {box:(newer?inc:cur).box||0, due:(newer?inc:cur).due||0};
  };
  const normCh=(st,k)=>{ if(st[k]) return st[k]; if(st.box!==undefined&&k==='name') return {box:st.box||0,due:st.due||0}; return {box:0,due:0}; };
  Object.keys(d.stats||{}).forEach(line=>{
    STORE.stats[line] = STORE.stats[line] || {};
    Object.keys(d.stats[line]).forEach(name=>{
      const inc = d.stats[line][name];
      const cur = STORE.stats[line][name];
      if(!cur){
        STORE.stats[line][name] = {misses:inc.misses||0, attempts:inc.attempts||0, lastSeen:inc.lastSeen||0,
          name:normCh(inc,'name'), map:normCh(inc,'map')};
        return;
      }
      const cN=normCh(cur,'name'), iN=normCh(inc,'name'), cM=normCh(cur,'map'), iM=normCh(inc,'map');
      const stampC={lastSeen:cur.lastSeen}, stampI={lastSeen:inc.lastSeen};
      STORE.stats[line][name] = {
        misses:(cur.misses||0)+(inc.misses||0),
        attempts:(cur.attempts||0)+(inc.attempts||0),
        lastSeen:Math.max(cur.lastSeen||0, inc.lastSeen||0),
        name:chMerge(Object.assign({},cN,stampC), Object.assign({},iN,stampI)),
        map:chMerge(Object.assign({},cM,stampC), Object.assign({},iM,stampI))
      };
    });
  });
  const seen = new Set(STORE.games.map(g=>g.ts));
  (d.games||[]).forEach(g=>{ if(!seen.has(g.ts)){ STORE.games.push(g); seen.add(g.ts); } });
  STORE.games.sort((a,b)=>a.ts-b.ts);
  if(STORE.games.length > 200) STORE.games = STORE.games.slice(-200);
}

  STORE = { version:4, stats:{}, games:[] };

  render();
}

function normalize(str){
  return str.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[-‐‑‒–—―'’]/g," ")
    .replace(/\s+/g," ")
    .trim();
}
// escape untrusted strings (e.g. imported history JSON) before innerHTML interpolation
const HTML_ESCAPES = {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"};
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => HTML_ESCAPES[c]);
}

function levenshtein(a, b){
  const m=a.length, n=b.length;
  if(m===0) return n; if(n===0) return m;
  let prev = Array.from({length:n+1}, (_,i)=>i);
  let cur = new Array(n+1);
  for(let i=1;i<=m;i++){
    cur[0]=i;
    for(let j=1;j<=n;j++){
      const cost = a[i-1]===b[j-1] ? 0 : 1;
      cur[j] = Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+cost);
    }
    [prev, cur] = [cur, prev];
  }
  return prev[n];
}

// fuzzy match: tolerates ~15% of the station-name length in edits (accents/hyphens already neutralised)
function matchesStation(guess, target){
  const g = normalize(guess), t = normalize(target);
  if(g.length===0) return false;
  if(g===t) return true;
  const allowed = Math.round(t.length * 0.15);
  if(allowed<1) return false;
  return levenshtein(g, t) <= allowed;
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

  state.bank = L.stations.map(s=>s.n).sort((a,b)=>a.localeCompare(b,'fr',{sensitivity:'base'}));
  // carte session: shuffled queue of station indices for the current line that have coordinates
  // (uses every station on the line, both branches for forked lines — geography doesn't care
  // which branch is selected for the linear "je nomme / je place" exercises)
  if(state.mode === "carte"){
    const carteStations = lineAllStations(state.lineKey);
    const idxs = carteStations.map((s,i)=>i).filter(i=>GEO.stations[carteStations[i].n]);
    state.map = { queue: shuffle(idxs), pos:0, results:[], phase: idxs.length?"ask":"empty", click:null, answered:false };
  } else {
    state.map = null;
  }
}

function setLine(key){
  state.lineKey = key;
  _forkScrollLeft = 0;   // new line → start its strip at the left
  resetLine();
  render();
}
function setMode(m){
  state.mode = m;
  _forkScrollLeft = 0;   // mode switch rebuilds the strip fresh
  resetLine();
  render();
}
function setCorrMode(m){
  state.corrMode = m;
  // leaving "ask" mid-question: clear any pending correspondence prompt
  if(m !== "ask" && state.pendingCorr !== null){
    state.pendingCorr = null;
    if(state.mode === "melange") maybeFinishMelange();
  }
  render();
}

/* ---------- View navigation ---------- */
function goView(v){
  state.view = v;
  if(v === "review") startReview();
  render();
}

/* ---------- Cross-line review session (two channels: name / map) ---------- */
function startReview(channel){
  channel = channel || (dueStations('name').length ? 'name' : (dueStations('map').length ? 'map' : 'name'));
  const queue = shuffle(dueStations(channel));
  state.rev = {
    channel, queue, pos: 0, results: [], wrong: 0,
    phase: queue.length ? "card" : "empty",
    click: null, answered: false
  };
}
function switchReviewChannel(ch){ startReview(ch); render(); }
function reviewCurrent(){
  const r = state.rev;
  return (r && r.queue[r.pos]) || null;
}
/* -- name channel: typing -- */
function reviewInput(){
  const c = reviewCurrent(); if(!c) return;
  const inp = document.getElementById("revInput"); if(!inp) return;
  if(normalize(inp.value).length < normalize(c.name).length) return;
  if(matchesStation(inp.value, c.name)) reviewAccept();
}
function reviewSubmit(){
  const c = reviewCurrent(); if(!c) return;
  const inp = document.getElementById("revInput");
  if(matchesStation(inp.value, c.name)){
    reviewAccept();
  } else {
    if(normalize(inp.value).length>0) state.rev.wrong++;
    const fb = document.getElementById("revFb");
    if(fb){ fb.textContent = normalize(inp.value).length>0 ? "✗ Incorrect — réessaie." : "Tape un nom de station."; fb.className = "feedback bad"; }
    inp.focus(); inp.select();
  }
}
function reviewAccept(){
  const c = reviewCurrent(); if(!c || state.rev._resolving) return;
  state.rev._resolving = true;
  const fb = document.getElementById("revFb");
  if(fb){ fb.textContent = "✓ Exact."; fb.className = "feedback ok"; }
  const grade = state.rev.wrong===0 ? 'clean' : 'miss';
  applyGrade(c.line, c.name, grade, 'name', state.rev.wrong);
  state.rev.results.push({line:c.line, name:c.name, wrong:state.rev.wrong, revealed:false, correct:true, dist:0});
  setTimeout(reviewAdvance, 350);
}
function reviewSkip(){
  const c = reviewCurrent(); if(!c || state.rev._resolving) return;
  state.rev._resolving = true;
  applyGrade(c.line, c.name, 'miss', 'name', 1);
  state.rev.results.push({line:c.line, name:c.name, wrong:state.rev.wrong, revealed:true, correct:false, dist:99999});
  const fb = document.getElementById("revFb");
  if(fb){ fb.textContent = `C'était « ${c.name} ».`; fb.className = "feedback bad"; }
  setTimeout(reviewAdvance, 900);
}
/* -- map channel: click to place -- */
function onRevMapClick(ev){
  const r = state.rev;
  if(!r || r.answered) return;
  const svg = document.getElementById("mapSvg");
  const rect = svg.getBoundingClientRect();
  const vx = (ev.clientX - rect.left)/rect.width * MAP.W;
  const vy = (ev.clientY - rect.top)/rect.height * MAP.H;
  revMapResolve(MAP.unproject(vx, vy));
}
function revMapReveal(){ revMapResolve(null); }
function revMapResolve(click){
  const r = state.rev;
  const c = reviewCurrent();
  const coord = GEO.stations[c.name];
  const dist = click ? MAP.haversine(click[0], click[1], coord[0], coord[1]) : Infinity;
  r.click = click;
  r.answered = true;
  const grade = (!click || dist>=500) ? 'miss' : (dist<200 ? 'clean' : 'hold');
  applyGrade(c.line, c.name, grade, 'map', grade==='miss'?1:0);
  r.results.push({line:c.line, name:c.name, dist:click?dist:99999, revealed:!click, correct:click&&dist<500});
  render();
}
function revMapNext(){
  const r = state.rev;
  r.answered = false; r.click = null;
  reviewAdvance();
}
function reviewAdvance(){
  const r = state.rev;
  r._resolving = false;
  r.pos++;
  r.wrong = 0;
  if(r.pos >= r.queue.length){
    const total = r.results.length;
    const isMap = r.channel==='map';
    const firstTry = isMap ? r.results.filter(x=>x.dist<200).length : r.results.filter(x=>x.correct && x.wrong===0).length;
    const withErrors = isMap ? r.results.filter(x=>x.dist>=200&&x.dist<500).length : r.results.filter(x=>x.correct && x.wrong>0).length;
    const revealed = isMap ? r.results.filter(x=>x.dist>=99999).length : r.results.filter(x=>x.revealed).length;
    const totalWrong = isMap ? r.results.filter(x=>x.dist>=500).length : r.results.reduce((a,x)=>a+x.wrong,0);
    const pct = total ? Math.round(100*(firstTry+0.5*withErrors)/total) : 0;
    logGame({ts:Date.now(), kind:"review", line:"—", mode:(isMap?"révision carte":"révision"), corrMode:"off",
      total, firstTry, withErrors, revealed, totalWrong, pct, corrOk:0, corrTotal:0});
    r.phase = "done";
    r.summary = {total, firstTry, withErrors, revealed, totalWrong, pct, isMap};
  }
  render();
}

function computeScore(){
  const L = LINES[state.lineKey];
  const idxs = [...(state.inPlay || new Set(L.stations.map((s,i)=>i)))];
  let firstTry=0, withErrors=0, revealed=0, totalWrong=0, done=0;
  idxs.forEach(i=>{
    const r = state.results[i];
    totalWrong += r.wrongAttempts || 0;
    if(r.stationCorrect === true){
      done++;
      if((r.wrongAttempts||0) === 0) firstTry++; else withErrors++;
    } else if(r.revealed){
      done++; revealed++;
    }
  });
  const total = idxs.length;
  // points: first try = 1, recovered after error(s) = 0.5, revealed = 0
  const points = firstTry + 0.5*withErrors;
  const pct = total ? Math.round(100*points/total) : 0;
  // correspondences (ask mode only), restricted to in-play stations
  const corrTotal = idxs.filter(i=>L.stations[i].c.length>0).length;
  const corrOk = idxs.filter(i=>state.results[i].corrCorrect===true).length;
  const corrAttempted = idxs.filter(i=>state.results[i].corrCorrect!==null).length;
  return {total, firstTry, withErrors, revealed, totalWrong, done, pct, corrTotal, corrOk, corrAttempted};
}

}

function corrChipsHtml(corrArr, small){
  if(corrArr.length===0) return "";
  const chip = c => `<span class="corr-chip-mini" style="background:${corrColor(c)};color:${corrTextColor(c)}">${c.replace("RER ","")}</span>`;
  const metro = corrArr.filter(c => !c.startsWith("RER ") && !/^T\d/.test(c));
  const regio = corrArr.filter(c => c.startsWith("RER ") || /^T\d/.test(c));
  let rows = "";
  if(metro.length) rows += `<div class="corr-line">${metro.map(chip).join("")}</div>`;
  if(regio.length) rows += `<div class="corr-line">${regio.map(chip).join("")}</div>`;
  return `<div class="corr-wrap">${rows}</div>`;
}

// ---------- Forked lines (line 13): two stacked friezes + connector ----------
// Layout constants shared between the renderer and the connector's geometry.
const FORK_SW = 46;      // fixed width per station (px)
const FORK_TOP_PAD = 160; // matches .fstrip's padding-top (spine Y within a row)
const FORK_ROW_GAP = 40; // vertical gap between the two friezes

function renderForkStrip(slotMode){
  const L = LINES[state.lineKey];
  const forkSide = L.forkSide || "left";   // "left" (line 13) or "right" (line 7)
  const trunkLen = L.trunk.length, aLen = L.branches.A.stations.length, bLen = L.branches.B.stations.length;
  const forkSlot = trunkLen - 1; // fork station's position (last of the trunk)
  const suppressCorrIdx = (state.pendingCorr !== null && !state.corrChecked) ? state.pendingCorr : -1;

  function stopHtml(s, idx, isTerminus, isFork, extraStyle){
    if(!s) return `<div class="fstop"${extraStyle?` style="${extraStyle}"`:""}></div>`; // invisible spacer
    const isHub = s.c.length>0;
    const known = state.view==="solutions" || (slotMode ? !!state.placed[idx] : !!state.named[idx]);
    const isActive = state.view!=="solutions" && !slotMode && state.activeIdx === idx;
    let cls = "fstop" + ((isHub||isFork)?" hub":"") + (known?" done":"") + (isActive?" current":"") + (isTerminus?" terminus":"") + (isFork?" fork":"");
    if(isScheduled(state.lineKey, s.n, 'name')) cls += " flagged";
    const clickable = !known && (slotMode || state.pendingCorr===null);
    if(clickable) cls += " slot";
    if(state.flashWrong===idx) cls += " wrong-flash";
    const dotStyle = known
      ? ((isHub||isFork) ? `style="background:#fff;border-color:#14140f"` : `style="background:${L.color};border-color:${L.color}"`)
      : "";
    const label = known ? s.n : (isActive ? "…" : "?");
    const showChips = isHub && idx !== suppressCorrIdx && (known || state.corrMode === "hint");
    const onclick = clickable
      ? (slotMode ? `onclick="onSlotClick(${idx})"` : `onclick="onDotClick(${idx})"`)
      : "";
    return `<div class="${cls}" data-idx="${idx}"${extraStyle?` style="${extraStyle}"`:""} ${onclick}>
        ${showChips ? corrChipsHtml(s.c, true) : ''}
        <div class="dot" ${dotStyle}></div>
        <div class="label">${label}</div>
      </div>`;
  }

  // Row layout uses flex row/row-reverse (per fork-side class on .fork-inner).
  // DOM order is always trunk[0] first; with row-reverse (forkSide "left") that
  // lands trunk[0] at the far right, with plain row (forkSide "right") at the
  // far left. Canonical indices are unaffected either way.
  let topHtml = `<div class="fstrip fstrip-top"><div class="spine" style="background:${L.color}"></div>`;
  L.trunk.forEach((s,i)=>{ topHtml += stopHtml(s, i, i===0, i===forkSlot); });
  L.branches.A.stations.forEach((s,j)=>{
    topHtml += stopHtml(s, trunkLen+j, j===aLen-1, false);
  });
  topHtml += `</div>`;

  // bottom row: forkSlot spacers sit under the trunk portion; branch B extends
  // outward from the fork. The first B station gets a full-slot margin on the
  // side facing the fork so it sits one cell away → the connector becomes a
  // clearly sloped diagonal and its label doesn't collide with the trace.
  // The margin side depends on the fork direction.
  const bOffsetSide = forkSide === "left" ? "margin-right" : "margin-left";
  let bottomHtml = `<div class="fstrip fstrip-bot"><div class="spine" style="background:${L.color}"></div>`;
  for(let i=0;i<forkSlot;i++) bottomHtml += stopHtml(null, -1, false, false);
  L.branches.B.stations.forEach((s,j)=>{
    bottomHtml += stopHtml(s, trunkLen+aLen+j, j===bLen-1, false, j===0?`${bOffsetSide}:${FORK_SW.toFixed(0)}px`:"");
  });
  bottomHtml += `</div>`;

  // Spines and the diagonal are positioned after layout (positions depend on
  // real rendered dot coordinates). scheduleForkLayout runs on the next frame.
  scheduleForkLayout(L.color);

  return `<div class="fork-wrap"><div class="fork-inner fork-${forkSide}">
    ${topHtml}
    <div style="height:${FORK_ROW_GAP}px"></div>
    ${bottomHtml}
  </div></div>`;
}

// Positions each row's spine to span exactly between its first & last real dots,
// and draws the diagonal connector from the fork dot to the start of branch B.
// On the finished screen we want the WHOLE plan visible at once (no scroll),
// even for long lines (7, 9, 13...). Scale the strip down to fit the panel width.
// We wait until the fork diagonal has been positioned (it's added by
// scheduleForkLayout on a later frame) before measuring, then scale the whole
// strip element — diagonal included — so everything stays aligned.
function fitFinishedStrip(tries){
  tries = tries || 0;
  requestAnimationFrame(()=>{
    const box = document.querySelector('.fit-strip');
    if(!box) return;
    const isFork = !!box.querySelector('.fork-inner');
    // for forked lines, wait until the diagonal has been drawn (up to ~10 frames)
    if(isFork && !box.querySelector('.fork-diag') && tries < 10){
      return fitFinishedStrip(tries+1);
    }
    const scroller = box.querySelector('.fork-wrap');
    if(scroller) scroller.style.overflowX = 'visible';
    const content = box.querySelector('.fork-inner') || box.querySelector('.strip');
    if(!content) return;
    // reset any previous scaling before measuring
    content.style.transform = '';
    box.style.height = '';
    const avail = box.clientWidth;
    const natural = content.scrollWidth;
    const scale = (natural > avail && natural > 0) ? (avail / natural) : 1;
    if(scale < 1){
      content.style.transformOrigin = 'left top';
      content.style.transform = `scale(${scale})`;
      box.style.height = (content.getBoundingClientRect().height) + 'px';
      box.style.overflow = 'hidden';
    }
  });
}

function scheduleForkLayout(color){
  requestAnimationFrame(()=>{
    const inner = document.querySelector('.fork-inner');
    if(!inner) return;
    // Measurements below use getBoundingClientRect, which is affected by any CSS
    // scale on .fork-inner (applied on the finished screen by fitFinishedStrip).
    // Temporarily clear the transform so all positions are computed in the
    // element's own unscaled coordinate system; the finished-screen fit is
    // re-applied afterwards.
    const hadTransform = inner.style.transform;
    if(hadTransform) inner.style.transform = '';
    const wrap = inner.closest('.fork-wrap');
    const irect = inner.getBoundingClientRect();
    const cx = d => { const r=d.getBoundingClientRect(); return r.x + r.width/2 - irect.x; };

    const topRow = inner.querySelector('.fstrip-top');
    const botRow = inner.querySelector('.fstrip-bot');
    if(!topRow || !botRow) return;

    // real dots = those inside a .fstop that has a label (spacers have none)
    const realDots = row => [...row.querySelectorAll('.fstop .dot')].filter(d=>d.parentElement.querySelector('.label'));

    const topDots = realDots(topRow);
    if(topDots.length){
      const xs = topDots.map(cx);
      const sp = topRow.querySelector('.spine');
      sp.style.left = Math.min(...xs)+'px';
      sp.style.width = (Math.max(...xs)-Math.min(...xs))+'px';
    }
    const botDots = realDots(botRow);
    let bmax = null;
    if(botDots.length){
      const xs = botDots.map(cx);
      bmax = Math.max(...xs);
      const sp = botRow.querySelector('.spine');
      sp.style.left = Math.min(...xs)+'px';
      sp.style.width = (bmax-Math.min(...xs))+'px';
    }

    // diagonal connector between the fork dot (top row) and branch B's first
    // dot (bottom row). Draw it from the branch-B end up to the fork, anchored
    // at that lower point, so the rotation direction is unambiguous. The B start
    // dot is the one nearest the fork: rightmost for a left-fork (line 13),
    // leftmost for a right-fork (line 7).
    const forkLeft = inner.classList.contains('fork-left');
    const forkDot = topRow.querySelector('.fstop.fork .dot');
    inner.querySelectorAll('.fork-diag').forEach(el=>el.remove());
    const bStartDot = botDots.length
      ? botDots.reduce((a,b)=> (forkLeft ? cx(a)>cx(b) : cx(a)<cx(b)) ? a : b)
      : null;
    if(forkDot && bStartDot){
      const fx = cx(forkDot), fy = FORK_TOP_PAD;
      const bx = cx(bStartDot), by = botRow.offsetTop + FORK_TOP_PAD;
      const dx = fx - bx, dy = fy - by;                 // from branch-B start → fork
      const len = Math.hypot(dx,dy), ang = Math.atan2(dy,dx)*180/Math.PI;
      const diag = document.createElement('div');
      diag.className = 'fork-diag';
      diag.style.left = bx+'px';
      diag.style.top = by+'px';
      diag.style.width = len+'px';
      diag.style.background = color;
      diag.style.transform = `translateY(-50%) rotate(${ang}deg)`;
      inner.appendChild(diag);
    }

    // Only allow horizontal scrolling if the content genuinely overflows.
    // Prevents an always-visible empty scrollbar (e.g. macOS "always show").
    if(wrap){
      wrap.style.overflowX = (inner.scrollWidth > wrap.clientWidth + 1) ? "auto" : "hidden";
      // restore the scroll position captured before the re-render (clamped to range)
      const maxScroll = Math.max(0, inner.scrollWidth - wrap.clientWidth);
      wrap.scrollLeft = Math.min(_forkScrollLeft, maxScroll);
    }
    // if we cleared a finished-screen scale to measure, recompute the fit now
    if(hadTransform) fitFinishedStrip();
  });
}

/* ---------- Loop line (line 10 — Auteuil loop): west trunk + two one-way arcs + east trunk ----------
   Three stacked rows: north arc (top, served only toward Boulogne), the bidirectional
   trunks on a split middle spine (west | lens gap | east), south arc (bottom, served only
   toward Austerlitz). Canonical indices follow the `stations` getter: west, south, north, east. */
function renderLoopStrip(slotMode){
  const L = LINES[state.lineKey];
  const wLen=L.westTrunk.length, sLen=L.loopSouth.length, nLen=L.loopNorth.length, eLen=L.eastTrunk.length;
  const IDX = { south:wLen, north:wLen+sLen, east:wLen+sLen+nLen };
  const suppressCorrIdx = (state.pendingCorr !== null && !state.corrChecked) ? state.pendingCorr : -1;

  function stopHtml(s, idx, isTerminus, isJunction){
    if(!s) return `<div class="fstop"></div>`; // invisible spacer
    const isHub = s.c.length>0;
    const known = state.view==="solutions" || (slotMode ? !!state.placed[idx] : !!state.named[idx]);
    const isActive = state.view!=="solutions" && !slotMode && state.activeIdx === idx;
    let cls = "fstop" + ((isHub||isJunction)?" hub":"") + (isJunction?" fork":"") + (known?" done":"") + (isActive?" current":"") + (isTerminus?" terminus":"");
    if(isScheduled(state.lineKey, s.n, 'name')) cls += " flagged";
    const clickable = !known && (slotMode || state.pendingCorr===null);
    if(clickable) cls += " slot";
    if(state.flashWrong===idx) cls += " wrong-flash";
    const dotStyle = known
      ? ((isHub||isJunction) ? `style="background:#fff;border-color:#14140f"` : `style="background:${L.color};border-color:${L.color}"`)
      : "";
    const label = known ? s.n : (isActive ? "\u2026" : "?");
    const showChips = isHub && idx !== suppressCorrIdx && (known || state.corrMode === "hint");
    const onclick = clickable ? (slotMode ? `onclick="onSlotClick(${idx})"` : `onclick="onDotClick(${idx})"`) : "";
    return `<div class="${cls}" data-idx="${idx}" ${onclick}>
        ${showChips ? corrChipsHtml(s.c, true) : ''}
        <div class="dot" ${dotStyle}></div>
        <div class="label">${label}</div>
      </div>`;
  }

  // TOP row: spacers under west trunk, north arc, spacers under east trunk
  let topHtml = `<div class="fstrip fstrip-top"><div class="spine" style="background:${L.color}"></div>`;
  for(let i=0;i<wLen;i++) topHtml += stopHtml(null);
  L.loopNorth.forEach((s,k)=> topHtml += stopHtml(s, IDX.north+k, false, false));
  for(let i=0;i<eLen;i++) topHtml += stopHtml(null);
  topHtml += `</div>`;

  // MID row: west trunk | lens gap | east trunk. Two spines (west, east). The last west
  // station (Boulogne–J.J.) and first east station (Javel) are the junction dots.
  let midHtml = `<div class="fstrip fstrip-mid"><div class="spine spine-west" style="background:${L.color}"></div><div class="spine spine-east" style="background:${L.color}"></div>`;
  L.westTrunk.forEach((s,i)=> midHtml += stopHtml(s, i, i===0, i===wLen-1));
  for(let i=0;i<sLen;i++) midHtml += stopHtml(null);
  L.eastTrunk.forEach((s,m)=> midHtml += stopHtml(s, IDX.east+m, m===eLen-1, m===0));
  midHtml += `</div>`;

  // BOT row: spacers, south arc, spacers
  let botHtml = `<div class="fstrip fstrip-bot"><div class="spine" style="background:${L.color}"></div>`;
  for(let i=0;i<wLen;i++) botHtml += stopHtml(null);
  L.loopSouth.forEach((s,j)=> botHtml += stopHtml(s, IDX.south+j, false, false));
  for(let i=0;i<eLen;i++) botHtml += stopHtml(null);
  botHtml += `</div>`;

  scheduleLoopLayout(L.color);

  return `<div class="fork-wrap"><div class="fork-inner fork-right loop-inner">
    ${topHtml}
    <div style="height:${FORK_ROW_GAP}px"></div>
    ${midHtml}
    <div style="height:${FORK_ROW_GAP}px"></div>
    ${botHtml}
  </div></div>`;
}

// Positions the three spines (top arc, split middle trunk, bottom arc), draws the four
// divergence/convergence diagonals at the two junctions, and the one-way captions. Like
// scheduleForkLayout, it measures real rendered dot coordinates on the next frame.
function scheduleLoopLayout(color){
  requestAnimationFrame(()=>{
    const inner = document.querySelector('.loop-inner');
    if(!inner) return;
    const hadTransform = inner.style.transform;
    if(hadTransform) inner.style.transform = '';
    const wrap = inner.closest('.fork-wrap');
    const irect = inner.getBoundingClientRect();
    const cx = d => { const r=d.getBoundingClientRect(); return r.x + r.width/2 - irect.x; };
    const topRow = inner.querySelector('.fstrip-top');
    const midRow = inner.querySelector('.fstrip-mid');
    const botRow = inner.querySelector('.fstrip-bot');
    if(!topRow||!midRow||!botRow) return;
    const realDots = row => [...row.querySelectorAll('.fstop .dot')].filter(d=>d.parentElement.querySelector('.label'));
    const spanSpine = (spine, dots) => {
      if(!spine || !dots.length) return;
      const xs = dots.map(cx);
      spine.style.left = Math.min(...xs)+'px';
      spine.style.width = (Math.max(...xs)-Math.min(...xs))+'px';
    };
    const L = LINES[state.lineKey];
    const wLen = L.westTrunk.length;
    const midDots = realDots(midRow);
    spanSpine(topRow.querySelector('.spine'), realDots(topRow));
    spanSpine(botRow.querySelector('.spine'), realDots(botRow));
    spanSpine(midRow.querySelector('.spine-west'), midDots.slice(0,wLen));
    spanSpine(midRow.querySelector('.spine-east'), midDots.slice(wLen));

    const yOf = row => row.offsetTop + FORK_TOP_PAD;
    const yTop=yOf(topRow), yMid=yOf(midRow), yBot=yOf(botRow);
    const dotByIdx = i => inner.querySelector(`.fstop[data-idx="${i}"] .dot`);
    const xOf = i => { const d=dotByIdx(i); return d?cx(d):null; };
    inner.querySelectorAll('.fork-diag,.loop-cap').forEach(el=>el.remove());
    const drawDiag = (ax,ay,bx,by) => {
      const dx=bx-ax, dy=by-ay, len=Math.hypot(dx,dy), ang=Math.atan2(dy,dx)*180/Math.PI;
      const d=document.createElement('div'); d.className='fork-diag loop-diag';
      d.style.left=ax+'px'; d.style.top=ay+'px'; d.style.width=len+'px'; d.style.background=color;
      d.style.transform=`translateY(-50%) rotate(${ang}deg)`;
      inner.appendChild(d);
    };
    const bjj=wLen-1, javel=wLen+L.loopSouth.length+L.loopNorth.length;
    const sFirst=wLen, sLast=wLen+L.loopSouth.length-1;
    const nFirst=wLen+L.loopSouth.length, nLast=nFirst+L.loopNorth.length-1;
    const bjjX=xOf(bjj), javelX=xOf(javel);
    if(bjjX!=null){
      if(xOf(nFirst)!=null) drawDiag(xOf(nFirst), yTop, bjjX, yMid);
      if(xOf(sFirst)!=null) drawDiag(xOf(sFirst), yBot, bjjX, yMid);
    }
    if(javelX!=null){
      if(xOf(nLast)!=null) drawDiag(xOf(nLast), yTop, javelX, yMid);
      if(xOf(sLast)!=null) drawDiag(xOf(sLast), yBot, javelX, yMid);
    }
    const cap = (x,y,txt,dir) => {
      const c=document.createElement('div'); c.className='loop-cap';
      c.textContent = dir==='left' ? ('\u25C0 '+txt) : (txt+' \u25B6');
      c.style.left=x+'px'; c.style.top=y+'px'; inner.appendChild(c);
    };
    const topDots=realDots(topRow), botDots=realDots(botRow);
    const endW = L.loopEndW || L.westTrunk[0].n, endE = L.loopEndE || L.eastTrunk[L.eastTrunk.length-1].n;
    if(topDots.length){ const xs=topDots.map(cx); cap((Math.min(...xs)+Math.max(...xs))/2, yTop-30, 'sens unique \u00B7 vers '+endW,'left'); }
    if(botDots.length){ const xs=botDots.map(cx); cap((Math.min(...xs)+Math.max(...xs))/2, yBot+26, 'sens unique \u00B7 vers '+endE,'right'); }

    if(wrap){
      wrap.style.overflowX = (inner.scrollWidth > wrap.clientWidth + 1) ? "auto" : "hidden";
      const maxScroll = Math.max(0, inner.scrollWidth - wrap.clientWidth);
      wrap.scrollLeft = Math.min(_forkScrollLeft, maxScroll);
    }
    if(hadTransform) fitFinishedStrip();
  });
}

// picks the renderer: loop lens (line 10), two-frieze fork (7/13), or the normal single strip
function renderLineStrip(slotMode){
  const L = LINES[state.lineKey];
  if(L.loop) return renderLoopStrip(slotMode);
  return L.branches ? renderForkStrip(slotMode) : renderStrip(slotMode);
}

// read-only answer key: every station name & correspondence always shown,
// nothing clickable. Reuses the same strip renderers (they check
// state.view==="solutions" to force every stop "known") and the finished-
// screen scale-to-fit so long lines display without horizontal scroll.
function renderSolutions(panel, note){
  const L = LINES[state.lineKey];
  panel.innerHTML = `<div class="fit-strip">${renderLineStrip(false)}</div>`;
  note.textContent = `Solution — ${L.name} : toutes les stations et correspondances.`;
  fitFinishedStrip();
}

// panel-head terminus display: normal lines show "A → B"; forked lines show
// the shared southern terminus plus both northern branch termini.
function panelHeadHtml(lineKey){
  const L = LINES[lineKey];
  if(L.loop){
    return `<div class="panel-head">
      <div class="terminus">${L.westTrunk[0].n}</div>
      <div class="arrow">⟷</div>
      <div class="terminus">${L.eastTrunk[L.eastTrunk.length-1].n}</div>
    </div>`;
  }
  if(L.branches){
    const sep = `<span style="color:var(--muted);font-weight:700;margin:0 2px">/</span>`;
    const trunkTerm = `<div class="terminus">${L.trunk[0].n}</div>`;
    const branchTerms = `<div class="terminus">${L.branches.A.terminus}</div>${sep}<div class="terminus">${L.branches.B.terminus}</div>`;
    // order follows the strip's visual direction: for a left-fork (line 13) the
    // branches are on the LEFT and the trunk terminus on the RIGHT; for a
    // right-fork (line 7) it's the opposite.
    const inner = (L.forkSide === "right")
      ? `${trunkTerm}<div class="arrow">⟷</div>${branchTerms}`
      : `${branchTerms}<div class="arrow">⟷</div>${trunkTerm}`;
    return `<div class="panel-head">${inner}</div>`;
  }
  return `<div class="panel-head">
      <div class="terminus">${L.stations[0].n}</div>
      <div class="arrow">→</div>
      <div class="terminus">${L.stations[L.stations.length-1].n}</div>
    </div>`;
}

function renderStrip(slotMode){
  const L = LINES[state.lineKey];
  // suppress chips for the station whose correspondences are being asked & not yet checked
  const suppressCorrIdx = (state.pendingCorr !== null && !state.corrChecked) ? state.pendingCorr : -1;
  let html = `<div class="strip-scroll"><div class="strip">
    <div class="spine" style="background:${L.color}"></div>`;
  L.stations.forEach((s,i)=>{
    const isHub = s.c.length>0;
    const known = state.view==="solutions" || (slotMode ? !!state.placed[i] : !!state.named[i]);
    const isActive = state.view!=="solutions" && !slotMode && state.activeIdx === i;
    const isTerminus = (i===0 || i===L.stations.length-1);
    let cls = "stop" + (isHub?" hub":"") + (known?" done":"") + (isActive?" current":"") + (isTerminus?" terminus":"");
    if(isScheduled(state.lineKey, s.n, 'name')) cls += " flagged";
    const clickable = !known && (slotMode || state.pendingCorr===null);
    if(clickable) cls += " slot";
    if(state.flashWrong===i) cls += " wrong-flash";
    const dotStyle = known
      ? (isHub ? `style="background:#fff;border-color:#14140f"` : `style="background:${L.color};border-color:${L.color}"`)
      : "";
    const label = known ? s.n : (isActive ? "…" : "?");
    const showChips = isHub && i !== suppressCorrIdx && (known || state.corrMode === "hint");
    const onclick = clickable
      ? (slotMode ? `onclick="onSlotClick(${i})"` : `onclick="onDotClick(${i})"`)
      : "";
    html += `<div class="${cls}" data-idx="${i}" ${onclick}>
        ${showChips ? corrChipsHtml(s.c, true) : ''}
        <div class="dot" ${dotStyle}></div>
        <div class="label">${label}</div>
      </div>`;
  });
  html += `</div></div>`;
  return html;
}

function render(){
  // Preserve horizontal scroll of the forked-line strip across re-renders:
  // every click rebuilds #panel (recreating .fork-wrap), which would otherwise
  // reset scrollLeft to 0. scheduleForkLayout restores it after the new strip
  // is laid out.
  const prevWrap = document.querySelector(".fork-wrap");
  _forkScrollLeft = prevWrap ? prevWrap.scrollLeft : _forkScrollLeft;

  renderNav();
  const panel = document.getElementById("panel");
  const note = document.getElementById("note");
  const chrome = document.getElementById("trainChrome");

  // route to the active view
  if(state.view === "review"){ chrome.style.display = "none"; renderReview(panel, note); return; }
  if(state.view === "history"){ chrome.style.display = "none"; renderHistory(panel, note); return; }
  if(state.view === "stats"){ chrome.style.display = "none"; renderStats(panel, note); return; }
  if(state.view === "solutions"){
    chrome.style.display = "";
    renderTabs();
    document.getElementById("modes").style.display = "none";
    document.getElementById("optsRow").style.display = "none";
    document.getElementById("reviewBanner").innerHTML = "";
    document.getElementById("scorebar").innerHTML = "";
    renderSolutions(panel, note);
    return;
  }

  // training view
  chrome.style.display = "";
  renderTabs();
  renderModes();
  renderOpts();
  document.getElementById("modes").style.display = "";
  document.getElementById("optsRow").style.display = (state.mode==="carte") ? "none" : "";
  document.getElementById("reviewBanner").innerHTML = "";
  if(state.mode === "carte"){ document.getElementById("scorebar").innerHTML = ""; renderCarte(panel, note); return; }
  renderScore();
  const L = LINES[state.lineKey];

  if(state.phase === "finished"){
    const s = computeScore();
    if(!state.gameLogged){
      logGame({ts:Date.now(), kind:"train", line:state.lineKey, mode:(state.mode==="ordre"?"je nomme":"je place"),
        corrMode:state.corrMode, total:s.total, firstTry:s.firstTry, withErrors:s.withErrors, revealed:s.revealed,
        totalWrong:s.totalWrong, pct:s.pct, corrOk:s.corrOk, corrTotal:s.corrTotal});
      state.gameLogged = true;
    }
    const row = (label, val) => `<div style="display:flex;justify-content:space-between;max-width:320px;margin:0 auto;padding:5px 0;border-bottom:1px solid #e4e0d3;font-size:14px"><span style="color:var(--muted)">${label}</span><b>${val}</b></div>`;
    panel.innerHTML = `
      <div class="fit-strip">${renderLineStrip(state.mode === "melange")}</div>
      <div class="done-screen">
        <div style="text-transform:uppercase;letter-spacing:0.1em;font-size:12px;color:var(--muted);font-weight:700">Terminé — ${L.name}</div>
        <div class="big">${s.pct}<span style="font-size:18px;color:var(--muted)">%</span></div>
        <div style="margin-top:14px">
          ${row("Du premier coup", `${s.firstTry} / ${s.total}`)}
          ${row("Après une ou plusieurs erreurs", s.withErrors)}
          ${state.mode==="ordre" ? row("Révélées (Je ne sais pas)", s.revealed) : ``}
          ${row("Total d'essais ratés", s.totalWrong)}
          ${(state.corrMode==="ask") ? row("Correspondances exactes", `${s.corrOk} / ${s.corrTotal}`) : ``}
          ${row("Stations à réviser sur cette ligne", scheduledStations(state.lineKey,'name').length)}
        </div>
        <button class="btn btn-primary" style="margin-top:18px" onclick="resetLine();render()">Recommencer cette ligne</button>
      </div>`;
    note.textContent = "Score : 1 point par station du premier coup, ½ point si trouvée après erreur, 0 si révélée.";
    fitFinishedStrip();
    return;
  }

  if(state.mode === "ordre"){
    renderOrdre(panel, note);
  } else {
    renderMelange(panel, note);
  }
}

/* ---------- Carte mode (geographic placement) ---------- */
// simple greedy label placement to avoid POI name overlap: tries a few offsets
// around each marker and picks the first that doesn't collide with already-placed labels.
function layoutPoiLabels(pois){
  const CATPRI = {gare:3, mon:2, parc:1};
  const fs = 10;
  const estW = txt => txt.length * fs * 0.56;
  const h = fs * 1.15;
  const items = pois.map(p=>{ const [x,y]=MAP.project(p.lng,p.lat); return {p,x,y}; });
  items.sort((a,b)=> (CATPRI[b.p.c]||0)-(CATPRI[a.p.c]||0) || a.y-b.y);
  const candidates = [
    {dx:6,  dy:3,  anchor:'start'},   // right
    {dx:-6, dy:3,  anchor:'end'},     // left
    {dx:0,  dy:-7, anchor:'middle'},  // above
    {dx:0,  dy:14, anchor:'middle'},  // below
    {dx:6,  dy:-7, anchor:'start'},   // upper-right
    {dx:-6, dy:-7, anchor:'end'}      // upper-left
  ];
  const placed = [];
  return items.map(it=>{
    const w = estW(it.p.n);
    let chosen = null;
    for(const c of candidates){
      let x0,x1;
      if(c.anchor==='start'){ x0=it.x+c.dx; x1=x0+w; }
      else if(c.anchor==='end'){ x1=it.x+c.dx; x0=x1-w; }
      else { x0=it.x+c.dx-w/2; x1=it.x+c.dx+w/2; }
      const y1=it.y+c.dy, y0=y1-h;
      const bbox={x0:x0-2,y0:y0-2,x1:x1+2,y1:y1+2};
      const overlaps = placed.some(pb=> !(bbox.x1<pb.x0||bbox.x0>pb.x1||bbox.y1<pb.y0||bbox.y0>pb.y1));
      if(!overlaps){ chosen={dx:c.dx,dy:c.dy,anchor:c.anchor,bbox}; break; }
    }
    if(!chosen) return {p:it.p, x:it.x, y:it.y, skip:true};
    placed.push(chosen.bbox);
    return {p:it.p, x:it.x, y:it.y, tx:it.x+chosen.dx, ty:it.y+chosen.dy, anchor:chosen.anchor, skip:false};
  });
}

function buildMapSvg(opts){
  opts = opts || {};
  const W=MAP.W, H=MAP.H;
  let s = `<svg id="mapSvg" viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;background:#f3f1e8;border-radius:8px;touch-action:manipulation" ${opts.clickable?'onclick="onMapClick(event)"':''}>`;
  // water (non-interactive)
  s += `<g style="pointer-events:none">` + GEO.water.map(r=>`<path d="${ringPath(r)}" fill="#bcd6ea" stroke="none"/>`).join('') + `</g>`;
  // arrondissements
  s += `<g style="pointer-events:none" fill="none" stroke="#c9c3b2" stroke-width="1.2">` + GEO.arr.map(a=>`<path d="${ringPath(a.ring)}"/>`).join('') + `</g>`;
  // POIs (categorised) — drawn BEFORE the trace so station dots always stay visible on top;
  // purely decorative, never intercept clicks / selection. Labels use simple collision avoidance.
  const CAT={ mon:{col:'#8a8472'}, gare:{col:'#7a5230'}, parc:{col:'#5a8a4a'} };
  const laidOut = layoutPoiLabels(POIS);
  s += `<g style="pointer-events:none;user-select:none">` + laidOut.map(it=>{
    const col=(CAT[it.p.c]||CAT.mon).col;
    const mark = it.p.c==='gare'
      ? `<rect x="${(it.x-3).toFixed(1)}" y="${(it.y-3).toFixed(1)}" width="6" height="6" fill="${col}"/>`
      : `<circle cx="${it.x.toFixed(1)}" cy="${it.y.toFixed(1)}" r="3" fill="${col}"/>`;
    const label = it.skip ? '' : `<text x="${it.tx.toFixed(1)}" y="${it.ty.toFixed(1)}" font-size="10" text-anchor="${it.anchor}" fill="${col}">${it.p.n}</text>`;
    return `<g>${mark}${label}</g>`;
  }).join('') + `</g>`;
  // optional trace: ALL lines' routes WITH station dots (context/hint), muted colour, non-interactive
  if(opts.trace){
    s += `<g style="pointer-events:none">`;
    Object.keys(LINES).forEach(lk=>{
      const L=LINES[lk];
      // forked lines (e.g. line 13) draw as two segments (trunk+branchA, trunk+branchB)
      // rather than one continuous line, since the branches physically diverge.
      const segments = L.branches
        ? Object.keys(L.branches).map(bk => L.trunk.concat(L.branches[bk].stations))
        : L.loop
          ? [ L.westTrunk.concat(L.loopSouth, L.eastTrunk),
              [L.westTrunk[L.westTrunk.length-1]].concat(L.loopNorth, L.eastTrunk[0]) ]
          : [lineAllStations(lk)];
      segments.forEach(segStations=>{
        const pts=segStations.map(st=>GEO.stations[st.n]).filter(Boolean);
        if(pts.length>1){
          const dpath=pts.map((p,i)=>{ const [x,y]=MAP.project(p[0],p[1]); return (i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1); }).join('');
          s += `<path d="${dpath}" fill="none" stroke="${L.color}" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" opacity="0.3"/>`;
        }
        pts.forEach(p=>{ const [x,y]=MAP.project(p[0],p[1]); s+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.4" fill="${L.color}" opacity="0.75"/>`; });
      });
    });
    s += `</g>`;
  }
  // answer overlay (after a click), non-interactive
  if(opts.answer){
    s += `<g style="pointer-events:none">`;
    const t=MAP.project(opts.answer.tlng, opts.answer.tlat);
    const c=opts.answer.click ? MAP.project(opts.answer.click[0], opts.answer.click[1]) : null;
    if(c){
      s += `<line x1="${c[0].toFixed(1)}" y1="${c[1].toFixed(1)}" x2="${t[0].toFixed(1)}" y2="${t[1].toFixed(1)}" stroke="#999" stroke-width="1.5" stroke-dasharray="4 3"/>`;
      s += `<circle cx="${c[0].toFixed(1)}" cy="${c[1].toFixed(1)}" r="5" fill="none" stroke="#14140f" stroke-width="2"/>`;
    }
    s += `<circle cx="${t[0].toFixed(1)}" cy="${t[1].toFixed(1)}" r="6" fill="${opts.answer.color}" stroke="#fff" stroke-width="2"/>`;
    s += `<text x="${t[0].toFixed(1)}" y="${(t[1]-10).toFixed(1)}" font-size="12" font-weight="800" text-anchor="middle" fill="#14140f">${opts.answer.name}</text>`;
    s += `</g>`;
  }
  s += `</svg>`;
  return s;
}

// shared result popup overlaid on the map centre (avoids scrolling back up)
function mapResultPopup(dist, nextFn, isLast){
  const rt = distRating(dist);
  const label = dist>=99999 ? `<span style="color:${rt.color};font-weight:800">Non trouvée</span>` :
    `<span style="color:${rt.color};font-weight:800">${rt.label}</span> · ${Math.round(dist)} m`;
  return `<div style="position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);
      background:rgba(255,255,255,0.97);border:1px solid #d8d4c4;border-radius:10px;
      box-shadow:0 10px 30px -8px rgba(0,0,0,0.45);padding:12px 16px;text-align:center;min-width:180px">
    <div style="font-size:14px;margin-bottom:10px">${label}</div>
    <button class="btn btn-primary" onclick="${nextFn}">${isLast?'Voir le résultat':'Suivant →'}</button>
  </div>`;
}

function renderCarte(panel, note){
  const L = LINES[state.lineKey];
  const m = state.map;
  if(!m || m.phase==="empty"){
    panel.innerHTML = `<div class="done-screen"><div class="big" style="font-size:20px">Pas de coordonnées pour cette ligne.</div></div>`;
    note.textContent = ""; return;
  }
  if(m.phase==="done"){
    const r = m.results;
    const exc = r.filter(x=>x.dist<200).length, bien=r.filter(x=>x.dist>=200&&x.dist<500).length, loin=r.filter(x=>x.dist>=500).length;
    const avg = r.length ? Math.round(r.reduce((a,x)=>a+x.dist,0)/r.length) : 0;
    const row=(l,v)=>`<div style="display:flex;justify-content:space-between;max-width:340px;margin:0 auto;padding:5px 0;border-bottom:1px solid #e4e0d3;font-size:14px"><span style="color:var(--muted)">${l}</span><b>${v}</b></div>`;
    panel.innerHTML = `<div class="done-screen">
      <div style="text-transform:uppercase;letter-spacing:0.1em;font-size:12px;color:var(--muted);font-weight:700">Carte terminée — ${L.name}</div>
      <div class="big">${avg}<span style="font-size:18px;color:var(--muted)"> m d'écart moyen</span></div>
      <div style="margin-top:14px">
        ${row("Excellent (< 200 m)", exc)}
        ${row("Bien (< 500 m)", bien)}
        ${row("Trop loin (≥ 500 m)", loin)}
        ${row("Stations à réviser sur cette ligne", scheduledStations(state.lineKey,'map').length)}
      </div>
      <button class="btn btn-primary" style="margin-top:18px" onclick="resetLine();render()">Recommencer</button>
    </div>`;
    note.textContent = "";
    return;
  }
  // active card
  const carteStations = lineAllStations(state.lineKey);
  const idx = m.queue[m.pos];
  const station = carteStations[idx];
  const coord = GEO.stations[station.n];
  const answered = m.answered;
  let answer = null, popup = "";
  if(answered){
    const dist = m.results[m.results.length-1].dist;
    const rt = distRating(dist);
    answer = {tlng:coord[0], tlat:coord[1], click:m.click, name:station.n, color:rt.color};
    popup = mapResultPopup(dist, "carteNext()", m.pos+1>=m.queue.length);
  }
  panel.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      ${lineBadge(state.lineKey)}

             <span style="display:inline-block;width:12px;height:12px;border-radius:3px;border:1px solid #b9b3a2;background:${state.mapTrace?'#6b6b63':'transparent'};vertical-align:-2px;margin-right:5px"></span>Afficher toutes les lignes</span>`}
    </div>
    <div style="position:relative">
      ${buildMapSvg({clickable:!answered, answer, trace: state.mapTrace})}

    </div>
  `;

}

function toggleTrace(){ state.mapTrace = !state.mapTrace; render(); }

function onMapClick(ev){
  const m = state.map;
  if(!m || m.answered) return;
  const svg = document.getElementById("mapSvg");
  const rect = svg.getBoundingClientRect();
  const vx = (ev.clientX - rect.left)/rect.width * MAP.W;
  const vy = (ev.clientY - rect.top)/rect.height * MAP.H;
  const [lng,lat] = MAP.unproject(vx, vy);
  carteResolve([lng,lat]);
}
function carteReveal(){ carteResolve(null); }

function carteResolve(click){
  const m = state.map;
  const carteStations = lineAllStations(state.lineKey);
  const idx = m.queue[m.pos];
  const station = carteStations[idx];
  const coord = GEO.stations[station.n];
  let dist;
  if(click){
    dist = MAP.haversine(click[0], click[1], coord[0], coord[1]);
  } else {
    dist = Infinity; // revealed
  }
  m.click = click;
  m.answered = true;
  m.results.push({name:station.n, dist:click?dist:99999});
  // feed spaced repetition (map channel). Only "trop loin"/reveal schedules for review.
  let grade;
  if(!click || dist >= 500) grade = 'miss';        // trop loin / je ne sais pas → à réviser
  else if(dist < 200) grade = 'clean';             // excellent → promote / stays out
  else grade = 'hold';                             // bien → hold, not scheduled
  applyGrade(state.lineKey, station.n, grade, 'map', grade==='miss'?1:0);
  render();
}
function carteNext(){
  const m = state.map;
  m.pos++;
  m.answered = false;
  m.click = null;
  if(m.pos >= m.queue.length){
    m.phase = "done";
    const r=m.results;
    const exc=r.filter(x=>x.dist<200).length, bien=r.filter(x=>x.dist>=200&&x.dist<500).length;
    const valid=r.filter(x=>x.dist<99999);
    const avg=valid.length?Math.round(valid.reduce((a,x)=>a+x.dist,0)/valid.length):0;
    const pct=r.length?Math.round(100*(exc+0.5*bien)/r.length):0;
    logGame({ts:Date.now(), kind:"carte", line:state.lineKey, mode:"carte", corrMode:"off",
      total:r.length, firstTry:exc, withErrors:bien, revealed:r.filter(x=>x.dist>=99999).length,
      totalWrong:r.filter(x=>x.dist>=500).length, pct, corrOk:0, corrTotal:0, avgDist:avg});
  }
  render();
}

function lineBadge(line){
  const L = LINES[line];
  const bg = L ? L.color : "#6b6b63";

  return `<span class="line-badge" style="background:${bg};color:${fg}">${escapeHtml(line)}</span>`;
}
function renderReviewMiniStrip(line, targetName){
  const L = LINES[line];
  const stations = contextStationsForName(line, targetName);
  let html = `<div class="strip-scroll"><div class="strip">
    <div class="spine" style="background:${L.color}"></div>`;
  stations.forEach((s,i)=>{
    const isHub = s.c.length>0;
    const isTarget = s.n === targetName;
    const known = !isTarget;
    const isTerminus = (i===0 || i===stations.length-1);
    let cls = "stop" + (isHub?" hub":"") + (known?" done":"") + (isTarget?" current":"") + (isTerminus?" terminus":"");
    const dotStyle = known
      ? (isHub ? `style="background:#fff;border-color:#14140f"` : `style="background:${L.color};border-color:${L.color}"`)
      : "";
    const label = known ? s.n : "?";
    const showChips = isHub && known;  // hide the target's own chips
    html += `<div class="${cls}">
        ${showChips ? corrChipsHtml(s.c, true) : ''}
        <div class="dot" ${dotStyle}></div>
        <div class="label">${label}</div>
      </div>`;
  });
  html += `</div></div>`;
  return html;
}
