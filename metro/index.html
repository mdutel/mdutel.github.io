/* ---------- Stats view: per-line progress + hardest stations ---------- */
function lineStats(line){
  const allStations = lineAllStations(line);
  const total = allStations.length;
  const m = STORE.stats[line] || {};
  let seen=0, scheduled=0, solid=0;
  allStations.forEach(s=>{
    const st = m[s.n];
    if(st && (st.attempts||0) > 0){
      seen++;
      const sched = (st.name&&st.name.box>=1) || (st.map&&st.map.box>=1);
      if(sched) scheduled++; else solid++;
    }
  });
  const untouched = total - seen;
  return {total, seen, scheduled, solid, untouched};
}
function renderStats(panel, note){
  // ---- per-line progress bars ----
  const lineBlocks = Object.keys(LINES).map(line=>{
    const st = lineStats(line);
    const pc = n => st.total ? (100*n/st.total) : 0;
    const L = LINES[line];
    return `<div style="margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
        ${lineBadge(line)}
        <span style="font-weight:800;font-size:13px">${L.name}</span>
        <span style="margin-left:auto;color:var(--muted);font-size:12px">
          ${st.solid} solides · ${st.scheduled} en révision · ${st.untouched} non vues
        </span>
      </div>
      <div style="display:flex;height:12px;border-radius:6px;overflow:hidden;background:#e7e3d6">
        <div style="width:${pc(st.solid)}%;background:var(--ok)"></div>
        <div style="width:${pc(st.scheduled)}%;background:var(--review)"></div>
        <div style="width:${pc(st.untouched)}%;background:transparent"></div>
      </div>
    </div>`;
  }).join("");

  // ---- hardest stations (by misses, then accuracy) ----
  const rows = [];
  Object.keys(STORE.stats).forEach(line=>{
    Object.keys(STORE.stats[line]).forEach(stationName=>{
      const st = STORE.stats[line][stationName];
      if((st.misses||0) > 0) rows.push(Object.assign({}, st, {line, stationName}));
    });
  });
  rows.sort((a,b)=> (b.misses-a.misses) || (b.attempts-a.attempts));
  const hardest = rows.slice(0, 20);
  const chBadge = (label, sc) => (sc && sc.box>=1)
    ? `<span style="color:var(--review);font-weight:700">${label} b${sc.box}</span>`
    : `<span style="color:var(--ok)">${label}✓</span>`;
  const schedLabel = st => {
    const nSched=(st.name&&st.name.box>=1), mSched=(st.map&&st.map.box>=1);
    if(!nSched && !mSched) return `<span style="color:var(--ok);font-weight:700">maîtrisée</span>`;
    return `${chBadge('nom', st.name)} · ${chBadge('carte', st.map)}`;
  };
  const hardRows = hardest.length ? hardest.map(st=>{
    const fails = st.fails||0;
    const acc = st.attempts ? Math.max(0, Math.round(100*(st.attempts-fails)/st.attempts)) : 0;
    return `<div class="hist-row">
      <span style="display:flex;align-items:center;gap:6px;min-width:38px">${lineBadge(st.line)}</span>
      <span style="flex:1;font-weight:600">${escapeHtml(st.stationName)}</span>
      <span class="meta" style="flex:none;min-width:140px;text-align:right">${st.misses} raté${st.misses>1?'s':''} · ${acc}%</span>
      <span style="min-width:150px;text-align:right;font-size:11px">${schedLabel(st)}</span>
    </div>`;
  }).join("") : `<div class="hist-empty">Aucune station ratée pour l'instant — rien à revoir.</div>`;

  panel.innerHTML = `<div class="hist-wrap">
    <div style="font-weight:800;text-transform:uppercase;font-size:13px;letter-spacing:0.06em;margin-bottom:12px">Progression par ligne</div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-bottom:14px">
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--ok);vertical-align:middle"></span> solides</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--review);vertical-align:middle"></span> en révision</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#e7e3d6;vertical-align:middle"></span> non vues</span>
    </div>
    ${lineBlocks}
    <div style="font-weight:800;text-transform:uppercase;font-size:13px;letter-spacing:0.06em;margin:22px 0 8px">Stations les plus difficiles</div>
    ${hardRows}
  </div>`;
  note.textContent = "";
}

function renderOrdre(panel, note){
  const L = LINES[state.lineKey];

  if(state.pendingCorr !== null){
    renderCorrQuestion(panel, note, state.pendingCorr, advanceAfterCorr);
    return;
  }

  const namedCount = Object.keys(state.named).length;
  if(namedCount >= L.stations.length){
    state.phase = "finished";
    render();
    return;
  }

  const stripHtml = renderLineStrip(false);
  const active = state.activeIdx;
  const qcard = (active === null)
    ? `<div class="qcard">
         <div class="qlabel">Clique un rond « ? » sur la ligne, puis donne le nom de cette station. (${namedCount}/${L.stations.length} trouvées)</div>
       </div>`
    : `<div class="qcard">
         <div class="qlabel">Station sélectionnée — quel est son nom ?</div>
         <input type="text" id="answerInput" placeholder="Tape le nom de la station" autocomplete="off" autocapitalize="off">
         <div class="row-btn">
           <button class="btn btn-primary" onclick="submitOrdre()">Valider</button>
           <button class="btn btn-secondary" onclick="skipOrdre()">Je ne sais pas</button>
         </div>
         <div id="fb" class="feedback"></div>
       </div>`;

  panel.innerHTML = `
    ${panelHeadHtml(state.lineKey)}
    ${stripHtml}
    ${qcard}
  `;
  note.textContent = active === null ? "" : "Astuce : la validation est automatique dès que c'est bon ; les fautes de frappe et accents sont tolérés.";
  if(active !== null){
    const inp = document.getElementById("answerInput");
    inp.focus();
    inp.addEventListener("keydown", e=>{ if(e.key==="Enter") submitOrdre(); });
    inp.addEventListener("input", onAnswerInput);
  }
}

function onAnswerInput(){
  const idx = state.activeIdx;
  if(idx === null || state.named[idx]) return;
  const inp = document.getElementById("answerInput");
  if(!inp) return;
  const target = LINES[state.lineKey].stations[idx].n;
  // auto-validate only once enough has been typed (no firing on a short prefix)
  if(normalize(inp.value).length < normalize(target).length) return;
  if(matchesStation(inp.value, target)){
    acceptStation(idx);
  }
}

function acceptStation(idx){
  if(state.named[idx]) return;          // guard against double-fire
  state.results[idx].stationCorrect = true;
  state.named[idx] = true;
  const fb = document.getElementById("fb");
  if(fb){ fb.textContent = "✓ Exact."; fb.className = "feedback ok"; }
  setTimeout(()=>finishNaming(idx, true), 350);
}

function onDotClick(idx){
  if(state.named[idx]) return;
  state.activeIdx = idx;
  render();
}

function submitOrdre(){
  const L = LINES[state.lineKey];
  const idx = state.activeIdx;
  if(idx === null || state.named[idx]) return;
  const inp = document.getElementById("answerInput");
  const guess = inp.value;
  const fb = document.getElementById("fb");
  if(matchesStation(guess, L.stations[idx].n)){
    acceptStation(idx);
  } else {
    // do not reveal the answer; count the miss and let the user try again
    if(normalize(guess).length>0) state.results[idx].wrongAttempts++;
    fb.textContent = normalize(guess).length>0 ? "✗ Incorrect — réessaie." : "Tape un nom de station.";
    fb.className = "feedback bad";
    inp.focus();
    inp.select();
    renderScore();
  }
}

function skipOrdre(){
  const L = LINES[state.lineKey];
  const idx = state.activeIdx;
  if(idx === null) return;
  state.results[idx].stationCorrect = false;
  state.results[idx].revealed = true;
  state.named[idx] = true;
  const fb = document.getElementById("fb");
  fb.textContent = `C'était « ${L.stations[idx].n} ».`;
  fb.className = "feedback bad";
  setTimeout(()=>finishNaming(idx, false), 900);
}

function finishNaming(idx, wasCorrect){
  const L = LINES[state.lineKey];
  state.activeIdx = null;
  recordStation(idx);
  if((state.corrMode==="ask") && L.stations[idx].c.length>0){
    state.pendingCorr = idx;
    state.corrSelection = [];
    state.corrChecked = false;
  }
  render();
}

function advanceAfterCorr(){
  state.pendingCorr = null;
  render();
}

function renderCorrQuestion(panel, note, idx, onContinue){

  panel.innerHTML = `

}

function toggleCorrOpt(o){
  if(state.corrChecked) return;
  const i = state.corrSelection.indexOf(o);
  if(i>=0) state.corrSelection.splice(i,1);
  else state.corrSelection.push(o);
  render();
}

function validateCorr(idx){
  if(state.corrChecked) return;
  const L = LINES[state.lineKey];
  const correctSet = new Set(L.stations[idx].c);
  const guessSet = new Set(state.corrSelection);
  let allCorrect = correctSet.size === guessSet.size;
  if(allCorrect){
    for(const c of correctSet){ if(!guessSet.has(c)){ allCorrect = false; break; } }
  }
  state.results[idx].corrCorrect = allCorrect;
  state.corrChecked = true;

  // recolor chips
  const box = document.getElementById("corrOptions");
  box.querySelectorAll(".corr-opt").forEach(btn=>{
    const o = btn.dataset.opt;
    btn.onclick = null;
    if(correctSet.has(o) && guessSet.has(o)) btn.className = "corr-opt correct";
    else if(correctSet.has(o) && !guessSet.has(o)) btn.className = "corr-opt missed";
    else if(!correctSet.has(o) && guessSet.has(o)) btn.className = "corr-opt extra";
  });

  document.getElementById("corrValidateBtn").style.display = "none";
  document.getElementById("corrNextBtn").style.display = "inline-block";
  const fb = document.getElementById("fbCorr");
  if(allCorrect){
    fb.textContent = "✓ Toutes les correspondances sont correctes.";
    fb.className = "feedback ok";
  } else {
    fb.textContent = "✗ Vert = correct, contour pointillé = manqué, barré = en trop.";
    fb.className = "feedback bad";
  }
  renderScore();
}

// ---- melange mode ----

function renderMelange(panel, note){
  const L = LINES[state.lineKey];

  if(state.pendingCorr !== null){
    renderCorrQuestion(panel, note, state.pendingCorr, ()=>{
      state.pendingCorr = null;
      maybeFinishMelange();
      render();
    });
    return;
  }

  const placedCount = Object.keys(state.placed).length;
  if(placedCount === L.stations.length && state.bank.length===0){
    maybeFinishMelange();
    if(state.phase==="finished"){ render(); return; }
  }

  const stripHtml = renderLineStrip(true);
  panel.innerHTML = `
    ${panelHeadHtml(state.lineKey)}
    ${stripHtml}
    <div class="qcard">
      <div class="qlabel">${state.selectedChip ? "Clique sur le bon emplacement sur la ligne ci-dessus." : "Clique d'abord une station ci-dessous, puis son emplacement sur la ligne."}</div>
      <input type="text" id="bankFilter" class="bank-filter" placeholder="Filtrer les stations…" autocomplete="off" autocapitalize="off" value="${(state.bankFilter||'').replace(/"/g,'&quot;')}">
      <div class="bank" id="bank"></div>
      <div id="fb" class="feedback"></div>
    </div>
  `;
  note.textContent = "";

  renderBankList();
  const filterEl = document.getElementById("bankFilter");
  filterEl.addEventListener("input", e=>{
    state.bankFilter = e.target.value;
    renderBankList();
  });
}

function renderBankList(){
  const bank = document.getElementById("bank");
  if(!bank) return;
  const f = normalize(state.bankFilter||"");
  const list = f ? state.bank.filter(n=>normalize(n).includes(f)) : state.bank;
  if(list.length===0){
    bank.innerHTML = `<span style="font-size:12px;color:var(--muted)">Aucune station ne correspond.</span>`;
    return;
  }
  bank.innerHTML = list.map(name=>{
    const sel = state.selectedChip===name;
    return `<button type="button" class="chip${sel?" selected":""}" onclick="selectChip('${name.replace(/'/g,"\\'")}')">${name}</button>`;
  }).join("");
}

function selectChip(name){
  state.selectedChip = (state.selectedChip===name) ? null : name;
  render();
}

function onSlotClick(idx){
  if(state.placed[idx]) return;
  if(!state.selectedChip) return;
  const L = LINES[state.lineKey];
  const correctName = L.stations[idx].n;
  if(state.selectedChip === correctName){
    state.placed[idx] = correctName;
    state.bank = state.bank.filter(n=>n!==correctName);
    state.results[idx].stationCorrect = true;
    state.selectedChip = null;
    state.bankFilter = "";
    recordStation(idx);
    if((state.corrMode==="ask") && L.stations[idx].c.length>0){
      state.pendingCorr = idx;
      state.corrSelection = [];
      state.corrChecked = false;
    }
    render();
  } else {
    state.flashWrong = idx;
    // count the miss against the station the user was trying to place (the selected chip)
    const targetIdx = L.stations.findIndex(s=>s.n===state.selectedChip);
    if(targetIdx>=0) state.results[targetIdx].wrongAttempts++;
    render();
    setTimeout(()=>{ state.flashWrong = null; render(); }, 500);
  }
}

function maybeFinishMelange(){
  const L = LINES[state.lineKey];
  if(Object.keys(state.placed).length === L.stations.length){
    state.phase = "finished";
  }
}

loadStore();
resetLine();
render();

// The forked-line strip positions its spines and diagonal in absolute pixels
// based on measured dot coordinates, so it must be recomputed when the viewport
// changes. Only forked lines need this; other views are pure CSS flow.
let _resizeRaf = null;
window.addEventListener("resize", ()=>{
  if(!LINES[state.lineKey] || (!LINES[state.lineKey].branches && !LINES[state.lineKey].loop)) return;
  if(state.view === "train" && state.mode === "carte") return;
  if(state.view !== "train" && state.view !== "solutions") return;
  if(_resizeRaf) cancelAnimationFrame(_resizeRaf);
  _resizeRaf = requestAnimationFrame(()=>{
    const _L=LINES[state.lineKey];
    (_L.loop ? scheduleLoopLayout : scheduleForkLayout)(_L.color);
    // on the finished screen and the solutions view the strip is scaled to fit; recompute that
    if(state.view === "solutions" || state.phase === "finished") fitFinishedStrip();
  });
});
</script>
