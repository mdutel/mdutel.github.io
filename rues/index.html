<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plan Vierge</title>
<style>
  :root{
    --paper:#E6E8E5; --ink:#36424A; --ink-soft:#9AA4A2; --grid:#D3D7D2;
    --poi:#5E7D78; --accent:#DD8A2E; --ok:#4F8A6B; --err:#B85A4E;
    --outside:#D6D9D3; --seine:#A9C4D0; --contourln:#AEB6AC;
    --panel:#283037; --panel-2:#313b43; --panel-text:#E9EBE7; --panel-dim:#8A969C; --line:#3c4750;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
    background:var(--panel); color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .stage{display:grid;grid-template-columns:1fr 340px;height:100vh}
  .map-wrap{background:var(--outside);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
  .map-wrap::after{content:attr(data-arr);position:absolute;right:18px;bottom:10px;font:600 13px ui-monospace,Menlo,monospace;color:var(--ink-soft);letter-spacing:.08em}
  .tooltip{position:absolute;top:0;left:0;pointer-events:none;z-index:5;background:var(--panel-2);color:var(--panel-text);border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:12.5px;line-height:1.5;box-shadow:0 10px 26px rgba(0,0,0,.4);max-width:260px;opacity:0;transform:translate(-9999px,-9999px);transition:opacity .08s ease}
  .tooltip.show{opacity:1}
  .tt-row+.tt-row{margin-top:6px;padding-top:6px;border-top:1px solid var(--line)}
  .tt-name{font-weight:600;display:block}
  .tt-cat{color:var(--panel-dim);font:500 10px ui-monospace,Menlo,monospace;text-transform:uppercase;letter-spacing:.05em;display:block;margin-top:1px}
  svg#map{width:100%;height:100%;display:block}
  .contour-fill{fill:var(--paper);stroke:none}
  .seine{fill:var(--seine);stroke:none;opacity:.92}
  .contour-line{fill:none;stroke:var(--contourln);stroke-width:1.4}

  /* États carto */
  .axe{stroke:var(--ink);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:stroke .12s,stroke-width .12s}
  .axe.b{stroke:var(--ink-soft);stroke-width:1.1}
  .poi-contour{fill:rgba(94,125,120,.10);stroke:var(--poi);stroke-width:1;transition:fill .12s,stroke .12s}
  .poi-circle{fill:rgba(94,125,120,.07);stroke:var(--poi);stroke-width:1;stroke-dasharray:3 3}
  .hi{stroke:var(--accent)!important;stroke-width:3.6!important}
  polygon.hi,circle.hi{fill:rgba(221,138,46,.24)!important}
  .ok{stroke:var(--ok)!important;stroke-width:3.6!important}
  polygon.ok,circle.ok{fill:rgba(79,138,107,.30)!important}
  .err{stroke:var(--err)!important;stroke-width:3.6!important}
  polygon.err,circle.err{fill:rgba(184,90,78,.26)!important}
  .reveal{stroke:var(--err)!important;stroke-width:4.5!important;animation:pulse .6s ease-in-out 3}
  polygon.reveal,circle.reveal{fill:rgba(184,90,78,.40)!important}
  @keyframes pulse{0%,100%{stroke-opacity:1}50%{stroke-opacity:.25}}

  /* Panneau */
  .panel{background:var(--panel);color:var(--panel-text);display:flex;flex-direction:column;padding:22px 22px 18px;gap:18px;overflow-y:auto}
  .brand{font:600 13px/1 ui-monospace,Menlo,monospace;letter-spacing:.18em;text-transform:uppercase;color:var(--panel-dim);display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand a{color:inherit;text-decoration:none}
  .brand b{color:var(--accent);font-weight:600}
  .brand-nav{display:flex;gap:10px;letter-spacing:.08em}
  .brand-nav a{color:var(--panel-dim);text-decoration:underline;text-decoration-color:transparent;transition:text-decoration-color .12s}
  .brand-nav a:hover{text-decoration-color:var(--panel-dim)}
  .prompt{border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:18px 0}
  #prompt-kind{font:600 11px/1 ui-monospace,Menlo,monospace;letter-spacing:.16em;text-transform:uppercase;color:var(--panel-dim)}
  #prompt-name{font-size:25px;font-weight:600;line-height:1.15;margin:9px 0 10px;letter-spacing:-.01em}
  #prompt-cat{display:inline-block;font:500 12px ui-monospace,Menlo,monospace;color:var(--poi);border:1px solid var(--line);border-radius:999px;padding:3px 11px}
  #msg{min-height:18px;font-size:13px;font-weight:500;color:var(--panel-dim)}
  #msg[data-kind="ok"]{color:var(--ok)} #msg[data-kind="err"]{color:var(--err)} #msg[data-kind="reveal"]{color:var(--accent)}
  .row{display:flex;gap:9px}
  button{font-family:inherit;font-size:13px;font-weight:500;border:1px solid var(--line);background:var(--panel-2);color:var(--panel-text);border-radius:8px;padding:10px 13px;cursor:pointer;transition:background .12s,border-color .12s}
  button:hover{background:#3a454e}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .arr-select{width:100%;font-family:inherit;font-size:13px;font-weight:500;border:1px solid var(--line);background:var(--panel-2);color:var(--panel-text);border-radius:8px;padding:9px 11px;cursor:pointer}
  .arr-select:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  #idk{flex:1}
  #solution-toggle{width:100%;text-align:left;display:flex;justify-content:space-between;align-items:center}
  #solution-toggle::after{content:"activer";font:500 11px ui-monospace,Menlo,monospace;color:var(--panel-dim)}
  #solution-toggle[data-on="1"]{border-color:var(--accent)}
  #solution-toggle[data-on="1"]::after{content:"désactiver";color:var(--accent)}
  #tier-filter{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:-8px}
  #tier-filter[hidden]{display:none}
  .tf-label{font:500 11px ui-monospace,Menlo,monospace;color:var(--panel-dim);text-transform:uppercase;letter-spacing:.06em}
  .tf-seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .tf-seg button{border:none;border-radius:0;padding:6px 13px;background:var(--panel-2);color:var(--panel-dim);font-size:12px;font-weight:600}
  .tf-seg button+button{border-left:1px solid var(--line)}
  .tf-seg button:hover{background:#3a454e;color:var(--panel-text)}
  .tf-seg button.on{background:var(--accent);color:var(--panel);cursor:default}
  /* Filtre palier — actif uniquement en mode solution (voir setSolutionMode). Les POIs restent visibles. */
  #map[data-tier="A"] .axe.b{display:none}
  #map[data-tier="B"] .axe:not(.b){display:none}
  #counters{display:flex;flex-direction:column;gap:6px;margin-top:2px}
  .cnt-head{font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--panel-dim);margin-top:8px;margin-bottom:2px}
  .cnt-row{display:grid;grid-template-columns:1fr 56px 34px;align-items:center;gap:9px;font-size:12.5px}
  .cnt-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cnt-bar{height:4px;background:var(--line);border-radius:2px;overflow:hidden}
  .cnt-bar i{display:block;height:100%;background:var(--ok);transition:width .35s}
  .cnt-num{font:500 11px ui-monospace,Menlo,monospace;color:var(--panel-dim);text-align:right}
  .nav-row{gap:9px}
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:12px}
  .nav-btn .badge-count{font:600 11px ui-monospace,Menlo,monospace;color:var(--accent)}
  .nav-btn:disabled,.nav-btn.is-empty{opacity:.45;cursor:default}
  .nav-btn:disabled .badge-count,.nav-btn.is-empty .badge-count{color:var(--panel-dim)}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:20;opacity:0;pointer-events:none;transition:opacity .12s ease}
  .modal-overlay.show{opacity:1;pointer-events:auto}
  .modal-box{position:relative;background:var(--panel);color:var(--panel-text);border:1px solid var(--line);border-radius:12px;box-shadow:0 20px 50px rgba(0,0,0,.5);max-width:560px;width:90%;max-height:82vh;overflow-y:auto;padding:26px 28px}
  .modal-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--panel-dim);font-size:20px;line-height:1;cursor:pointer;padding:4px}
  .modal-close:hover{background:none;color:var(--panel-text)}

  .modal-h{font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--panel-dim);margin:0 0 6px}
  .modal-score{font-size:22px;font-weight:600;margin:0 0 4px}
  .modal-sub{font-size:13px;color:var(--panel-dim);margin:0 0 20px}
  .modal-actions{display:flex;flex-direction:column;gap:9px}
  .modal-section{margin:22px 0 8px}

  .hist-row{display:grid;grid-template-columns:auto 1fr auto auto;gap:10px;align-items:center;font-size:12.5px;padding:8px 0;border-bottom:1px solid var(--line)}
  .hist-row:last-child{border-bottom:none}
  .hist-date{color:var(--panel-dim);font:500 11px ui-monospace,Menlo,monospace;white-space:nowrap}
  .hist-mode{font:500 10px ui-monospace,Menlo,monospace;text-transform:uppercase;letter-spacing:.05em;color:var(--poi);border:1px solid var(--line);border-radius:999px;padding:2px 8px;white-space:nowrap}
  .hist-score{font:600 12px ui-monospace,Menlo,monospace;white-space:nowrap}
  .hist-empty{color:var(--panel-dim);font-size:13px;padding:10px 0}
  .hist-footer{display:flex;gap:9px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
  .hist-footer button,.hist-footer .btn-file{flex:1}
  .btn-file{font-family:inherit;font-size:13px;font-weight:500;border:1px solid var(--line);background:var(--panel-2);color:var(--panel-text);border-radius:8px;padding:10px 13px;cursor:pointer;text-align:center;transition:background .12s,border-color .12s}
  .btn-file:hover{background:#3a454e}

  .stat-block{margin-bottom:18px}
  .stat-block:last-child{margin-bottom:0}
  .stat-block-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12.5px}
  .stat-block-head b{font-weight:600}
  .stat-block-head .meta{margin-left:auto;color:var(--panel-dim);font-size:11px}
  .hardest-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
  .hardest-table td{padding:5px 0;border-bottom:1px solid var(--line)}
  .hardest-table td:last-child{text-align:right;color:var(--panel-dim)}
  .toosmall{display:none}
  @media(max-width:820px){
    .stage{display:none} .toosmall{display:flex;height:100vh;align-items:center;justify-content:center;padding:30px;text-align:center;color:var(--panel-text);font-size:15px;line-height:1.5}
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="map-wrap">
      <svg id="map" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="tooltip" class="tooltip"></div>
    </div>
    <aside class="panel">
      <div class="brand">
        <a href="../"><b>Plan Vierge</b></a>
        <nav class="brand-nav">
          <a href="../">Accueil</a>
          <a href="../metro/">Métro</a>
        </nav>
      </div>
      <select id="arr-select" class="arr-select" aria-label="Arrondissement"></select>
      <div class="prompt">
        <div id="prompt-kind">Pointez la voie</div>
        <div id="prompt-name">—</div>
        <span id="prompt-cat"></span>
      </div>
      <div id="msg" data-kind=""></div>
      <div class="row">
        <button id="idk">Je ne sais pas</button>
        <button id="restart">Nouveau tour</button>
      </div>
      <button id="solution-toggle" data-on="0">Mode solution</button>
      <div id="tier-filter" hidden>
        <span class="tf-label">Palier</span>
        <div class="tf-seg" role="group" aria-label="Filtre palier">
          <button type="button" data-tier="A">A</button>
          <button type="button" data-tier="AB" class="on">A+B</button>
          <button type="button" data-tier="B">B</button>
        </div>
      </div>
      <div class="row nav-row">
        <button id="review-btn" class="nav-btn" disabled><span>À réviser</span><span class="badge-count">0</span></button>
        <button id="stats-btn" class="nav-btn"><span>Stats</span></button>
        <button id="history-btn" class="nav-btn"><span>Historique</span></button>
      </div>
      <div id="counters"></div>
    </aside>
  </div>
  <div class="toosmall">Cet outil est conçu pour un écran d’ordinateur (le survol à la souris est central). Ouvrez-le sur un laptop.</div>
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-box" role="dialog" aria-modal="true">
      <button id="modal-close" class="modal-close" aria-label="Fermer">×</button>
      <div id="modal-body"></div>
    </div>
  </div>

<script>
/* Plan Vierge — mémorisation des rues de Paris. Logique d'orientation, multi-arrondissement. */
(function () {
  "use strict";

  // ---------- Arrondissements disponibles ----------
  const ARRONDISSEMENTS = [
    { insee: "75113", label: "13e" }
  ];
  let DATA = null;
  let currentInsee = null;

  // ---------- Storage (dégrade sans crash si localStorage bloqué) ----------
  const Store = (function () {
    const mem = {};
    let ok = true;
    try { localStorage.setItem("__t", "1"); localStorage.removeItem("__t"); }
    catch (e) { ok = false; }
    return {
      get(k) { try { return ok ? localStorage.getItem(k) : mem[k]; } catch (e) { return mem[k]; } },
      set(k, v) { try { ok ? localStorage.setItem(k, v) : (mem[k] = v); } catch (e) { mem[k] = v; } }
    };
  })();
  // ---------- Progression + rappel espacé (Leitner), scopé par arrondissement ----------
  const MASTERED_KEY = "rues_mastered_v1";   // ancienne clé (Set booléen), lue une fois pour migration
  const PROGRESS_KEY = "rues_progress_v1";
  const SR_INTERVALS = [0, 1, 3, 7, 16, 35]; // jours, index = palier (box)
  const SR_MAXBOX = 5;
  const DAY_MS = 86400000;
  function nextDue(box) { return Date.now() + SR_INTERVALS[box] * DAY_MS; }

  function migrateFromMastered() {
    const fresh = { version: 1, items: {}, games: [] };
    const old = Store.get(MASTERED_KEY);
    if (old) {
      try {
        const keys = JSON.parse(old); // tableau de "{insee}:{name}"
        const now = Date.now();
        keys.forEach(k => {
          const idx = k.indexOf(":");
          if (idx < 0) return;
          const insee = k.slice(0, idx), name = k.slice(idx + 1);
          if (!fresh.items[insee]) fresh.items[insee] = {};
          fresh.items[insee][name] = { box: 0, due: 0, attempts: 1, misses: 0, lastSeen: now };
        });
      } catch (e) { /* ancienne donnée corrompue — on repart de zéro */ }
    }
    saveProgress(fresh);
    return fresh;
  }
  function loadProgress() {
    const raw = Store.get(PROGRESS_KEY);
    let store = null;
    if (raw) { try { store = JSON.parse(raw); } catch (e) { /* repli sur migration/fresh */ } }
    if (!store) store = migrateFromMastered();
    return healProgress(store);
  }
  // Correctif ponctuel (v2) : l'ancien applyGrade faisait box++ dès la 1re bonne
  // réponse, poussant tout item réussi du premier coup en box 1 ("en révision")
  // au lieu de le laisser solide (box 0). Sous la logique corrigée, box >= 1
  // implique forcément un vrai raté (misses >= 1) ; donc tout item box >= 1 sans
  // aucun raté est un résidu du bug -> on le repasse solide, sans perdre les vrais
  // ratés. Lossless, calqué sur la sémantique de métro.
  function healProgress(store) {
    if (!store || store.version >= 2) return store;
    Object.keys(store.items || {}).forEach(insee => {
      const items = store.items[insee];
      Object.keys(items).forEach(name => {
        const rec = items[name];
        if (rec.box >= 1 && !(rec.misses > 0)) { rec.box = 0; rec.due = 0; }
      });
    });
    store.version = 2;
    saveProgress(store);
    return store;
  }
  function saveProgress(store) { Store.set(PROGRESS_KEY, JSON.stringify(store)); }

  function itemRecord(insee, name) {
    return (PROGRESS.items[insee] && PROGRESS.items[insee][name]) || null;
  }
  function isGraduated(rec) { return !!rec && rec.attempts > 0 && rec.box === 0; }
  function isDue(rec) { return !!rec && rec.box >= 1 && rec.due <= Date.now(); }
  function dueItems(insee) {
    // Portée V1 : uniquement l'arrondissement actuellement chargé (voir HANDOFF.md).
    return targets.filter(t => isDue(itemRecord(insee, t.name)));
  }
  function dueCount() { return currentInsee ? dueItems(currentInsee).length : 0; }

  function applyGrade(insee, name, grade) {
    if (!PROGRESS.items[insee]) PROGRESS.items[insee] = {};
    const rec = PROGRESS.items[insee][name] || { box: 0, due: 0, attempts: 0, misses: 0, lastSeen: 0 };
    rec.attempts++; rec.lastSeen = Date.now();
    if (grade === "clean") {
      if (rec.box >= 1) rec.box++;          // juste du 1er coup depuis box 0 = solide, reste hors programme
    } else {
      rec.misses++; rec.box = 1;            // entre / réinitialise la remédiation
    }
    if (rec.box > SR_MAXBOX) { rec.box = 0; rec.due = 0; }   // diplômé
    else if (rec.box >= 1) rec.due = nextDue(rec.box);
    else rec.due = 0;
    PROGRESS.items[insee][name] = rec;
    saveProgress(PROGRESS);
  }

  function logGame(entry) {
    const pct = entry.total ? Math.round(100 * entry.found / entry.total) : 0;
    PROGRESS.games.push(Object.assign({ ts: Date.now(), pct }, entry));
    if (PROGRESS.games.length > 200) PROGRESS.games = PROGRESS.games.slice(-200);
    saveProgress(PROGRESS);
  }

  function exportHistory() {
    try {
      const blob = new Blob([JSON.stringify(PROGRESS, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "rues-progression.json";
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1500);
    } catch (e) { alert("Export impossible dans ce contexte."); }
  }
  function importHistory(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const d = JSON.parse(reader.result);
        if (!d || !d.items) throw new Error("format");
        mergeProgress(d);
        saveProgress(PROGRESS);
        refreshBase(); updateCounters(); renderModal();
      } catch (e) { alert("Fichier de progression invalide."); }
    };
    reader.readAsText(file);
  }
  function mergeProgress(incoming) {
    Object.keys(incoming.items || {}).forEach(insee => {
      PROGRESS.items[insee] = PROGRESS.items[insee] || {};
      Object.keys(incoming.items[insee]).forEach(name => {
        const inc = incoming.items[insee][name];
        const cur = PROGRESS.items[insee][name];
        if (!cur || (inc.lastSeen || 0) >= (cur.lastSeen || 0)) PROGRESS.items[insee][name] = inc;
      });
    });
    const seen = new Set(PROGRESS.games.map(g => g.ts + ":" + g.insee + ":" + g.mode));
    (incoming.games || []).forEach(g => {
      const key = g.ts + ":" + g.insee + ":" + g.mode;
      if (!seen.has(key)) { PROGRESS.games.push(g); seen.add(key); }
    });
    PROGRESS.games.sort((a, b) => a.ts - b.ts);
    if (PROGRESS.games.length > 200) PROGRESS.games = PROGRESS.games.slice(-200);
  }
  function clearHistory() {
    if (!confirm("Effacer TOUTE la progression et l'historique, tous arrondissements confondus ? Action irréversible.")) return;
    PROGRESS = { version: 1, items: {}, games: [] };
    saveProgress(PROGRESS);
    refreshBase(); updateCounters(); renderModal();
  }

  // ---------- Chargement des modules de données ----------
  function loadArrondissement(insee, cb) {
    if (window.RUES_DATA && window.RUES_DATA[insee]) { cb(window.RUES_DATA[insee]); return; }
    const s = document.createElement("script");
    s.src = "data/" + insee + ".js";
    s.onload = function () {
      if (!window.RUES_DATA || !window.RUES_DATA[insee]) { console.error("Module de données introuvable pour", insee); return; }
      cb(window.RUES_DATA[insee]);
    };
    s.onerror = function () { console.error("Échec de chargement du module de données pour", insee); };
    document.head.appendChild(s);
  }

  // ---------- Projection ----------
  const PAD = 16, DW = 1040;
  let bounds, midLat, scale, DH, pxPerMeter;

  function polyRings(geom) {
    if (!geom) return [];
    if (geom.type === "Polygon") return geom.coordinates;
    if (geom.type === "MultiPolygon") return geom.coordinates.reduce((a, p) => a.concat(p), []);
    return [];
  }
  function forEachCoord(cb) {
    DATA.axes.forEach(a => a.geometry.coordinates.forEach(ls => ls.forEach(cb)));
    DATA.pois.forEach(p => {
      if (p.geometry) polyRings(p.geometry).forEach(r => r.forEach(cb));
      else cb(p.center);
    });
  }
  function frameCoords(cb) {
    if (DATA.contour) polyRings(DATA.contour).forEach(r => r.forEach(cb));
    else forEachCoord(cb);
  }
  function setupProjection() {
    let minLon = Infinity, maxLon = -Infinity, minLat = Infinity, maxLat = -Infinity;
    frameCoords(c => {
      if (c[0] < minLon) minLon = c[0]; if (c[0] > maxLon) maxLon = c[0];
      if (c[1] < minLat) minLat = c[1]; if (c[1] > maxLat) maxLat = c[1];
    });
    bounds = { minLon, maxLon, minLat, maxLat };
    midLat = (minLat + maxLat) / 2;
    const spanX = (maxLon - minLon) * Math.cos(midLat * Math.PI / 180);
    const spanY = (maxLat - minLat);
    scale = (DW - 2 * PAD) / spanX;
    DH = spanY * scale + 2 * PAD;
    pxPerMeter = scale / 111320;
  }
  function project(c) {
    const x = PAD + (c[0] - bounds.minLon) * Math.cos(midLat * Math.PI / 180) * scale;
    const y = PAD + (bounds.maxLat - c[1]) * scale;
    return [x, y];
  }
  function ringPath(ring) {
    return ring.map((c, i) => { const p = project(c); return (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1); }).join(" ") + " Z";
  }
  function polyPath(geom) {
    const rings = geom.type === "Polygon" ? geom.coordinates : geom.coordinates.reduce((a, p) => a.concat(p), []);
    return rings.map(ringPath).join(" ");
  }

  // ---------- Géométrie de hit-test ----------
  function distPointSeg(px, py, ax, ay, bx, by) {
    const dx = bx - ax, dy = by - ay;
    const l2 = dx * dx + dy * dy;
    let t = l2 ? ((px - ax) * dx + (py - ay) * dy) / l2 : 0;
    t = Math.max(0, Math.min(1, t));
    const cx = ax + t * dx, cy = ay + t * dy;
    return Math.hypot(px - cx, py - cy);
  }
  function pointInRing(px, py, ring) {
    let inside = false;
    for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
      const xi = ring[i][0], yi = ring[i][1], xj = ring[j][0], yj = ring[j][1];
      const hit = ((yi > py) !== (yj > py)) &&
        (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
      if (hit) inside = !inside;
    }
    return inside;
  }
  function distToRing(px, py, ring) {
    let d = Infinity;
    for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
      d = Math.min(d, distPointSeg(px, py, ring[j][0], ring[j][1], ring[i][0], ring[i][1]));
    }
    return d;
  }

  // ---------- Construction des cibles ----------
  const NS = "http://www.w3.org/2000/svg";
  const targets = [];

  function buildTargets() {
    targets.length = 0;
    // Axes
    DATA.axes.forEach(a => {
      const segs = [];      // segments projetés [x1,y1,x2,y2]
      const polylines = []; // pour le rendu
      a.geometry.coordinates.forEach(ls => {
        const pts = ls.map(project);
        polylines.push(pts);
        for (let i = 1; i < pts.length; i++)
          segs.push([pts[i - 1][0], pts[i - 1][1], pts[i][0], pts[i][1]]);
      });
      targets.push({
        kind: "axe", name: a.name, category: a.category, tier: a.tier,
        polylines, segs, els: [],
        dist(px, py) {
          let d = Infinity;
          for (const s of this.segs) d = Math.min(d, distPointSeg(px, py, s[0], s[1], s[2], s[3]));
          return d;
        }
      });
    });
    // POIs
    DATA.pois.forEach(p => {
      const c = project(p.center);
      if (p.shape === "contour" && p.geometry) {
        const rings = polyRings(p.geometry).map(r => r.map(project));
        targets.push({
          kind: "poi", name: p.name, category: p.category, tier: "A",
          rings, center: c, els: [],
          dist(px, py) {
            for (const r of this.rings) if (pointInRing(px, py, r)) return 0;
            let d = Infinity;
            for (const r of this.rings) d = Math.min(d, distToRing(px, py, r));
            return d;
          }
        });
      } else {
        const r = Math.max(7, p.radius_m * pxPerMeter);
        targets.push({
          kind: "poi", name: p.name, category: p.category, tier: "A",
          circle: { x: c[0], y: c[1], r }, center: c, els: [],
          dist(px, py) { return Math.max(0, Math.hypot(px - this.circle.x, py - this.circle.y) - this.circle.r); }
        });
      }
    });
  }

  // ---------- Rendu SVG ----------
  let svg, tooltip;
  function el(tag, attrs) {
    const e = document.createElementNS(NS, tag);
    for (const k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }
  function renderSVG() {
    svg = document.getElementById("map");
    while (svg.firstChild) svg.removeChild(svg.firstChild);
    svg.setAttribute("viewBox", `0 0 ${DW} ${DH}`);
    const gFrame = el("g", {});
    if (DATA.contour) gFrame.appendChild(el("path", { d: polyPath(DATA.contour), class: "contour-fill" }));
    if (DATA.seine) gFrame.appendChild(el("path", { d: polyPath(DATA.seine), class: "seine", "fill-rule": "evenodd" }));
    if (DATA.contour) gFrame.appendChild(el("path", { d: polyPath(DATA.contour), class: "contour-line", "fill-rule": "evenodd" }));
    svg.appendChild(gFrame);
    const gAxesB = el("g", {}), gAxesA = el("g", {}), gPoi = el("g", {}), gCircle = el("g", {});
    targets.forEach(t => {
      if (t.kind === "axe") {
        const g = t.tier === "A" ? gAxesA : gAxesB;
        t.polylines.forEach(pts => {
          const pl = el("polyline", {
            points: pts.map(p => p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" "),
            class: "axe" + (t.tier === "B" ? " b" : ""), fill: "none"
          });
          g.appendChild(pl); t.els.push(pl);
        });
      } else if (t.rings) {
        t.rings.forEach(r => {
          const pg = el("polygon", {
            points: r.map(p => p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" "),
            class: "poi-contour"
          });
          gPoi.appendChild(pg); t.els.push(pg);
        });
      } else {
        const ci = el("circle", { cx: t.circle.x.toFixed(1), cy: t.circle.y.toFixed(1), r: t.circle.r.toFixed(1), class: "poi-circle" });
        gCircle.appendChild(ci); t.els.push(ci);
      }
    });
    svg.appendChild(gAxesB); svg.appendChild(gAxesA); svg.appendChild(gPoi); svg.appendChild(gCircle);
  }

  function setClass(t, cls) { t.els.forEach(e => { e.setAttribute("class", e.getAttribute("class").replace(/ (hi|ok|err|reveal)/g, "") + (cls ? " " + cls : "")); }); }

  // ---------- État de jeu ----------
  let solutionMode = false;
  let solutionTier = "AB";        // filtre du mode solution : "A" | "AB" | "B" (revue de la séparation des paliers)
  let PROGRESS = loadProgress();
  let queue = [], qi = 0, current = null, found = 0, totalRound = 0;
  let hi = [], busy = false;
  let roundMistakes = [];        // cibles ratées ce tour-ci (retry impossible, comptent comme erreur)
  let roundMode = "training";    // "training" | "review" | "mistakes"
  let lastSummary = null;        // résumé figé du dernier tour terminé, pour la modale

  function activePool() {
    return targets;
  }
  function resetSession() {
    // efface l'état du tour (vert trouvé / rouge raté) — appelé au début de chaque tour
    targets.forEach(t => { t._sess = null; });
    refreshBase();
  }
  function refreshBase() {
    // repeint la carte selon l'état du tour en cours (neutre / vert trouvé / rouge raté)
    targets.forEach(t => { setClass(t, sessionClassOf(t)); });
  }
  function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } return a; }

  function startRound(mode) {
    roundMode = mode || "training";
    roundMistakes = [];
    resetSession();

    updateCounters();
    if (!queue.length) { if (!solutionMode) showPrompt(null); return; }
    next();
  }
  function next() {
    clearHi();

    current = queue[qi];
    if (!solutionMode) showPrompt(current);
    setMsg("");
  }
  function finishRound() {
    const errors = roundMistakes.length;
    lastSummary = { mode: roundMode, total: totalRound, found, errors, insee: currentInsee };
    logGame({ insee: currentInsee, mode: roundMode, total: totalRound, found, errors });
    updateCounters();
    if (!solutionMode) openModal("summary");
  }
  function showPrompt(t) {
    const pk = document.getElementById("prompt-kind");
    const pn = document.getElementById("prompt-name");
    const pc = document.getElementById("prompt-cat");
    if (!t) { pk.textContent = "Rien à réviser"; pn.textContent = "Tout est masqué ou vide"; pc.textContent = ""; return; }
    pk.textContent = t.kind === "axe" ? "Pointez la voie" : "Pointez le lieu";
    pn.textContent = t.name;
    pc.textContent = t.category;
  }
  function setMsg(m, kind) {
    const e = document.getElementById("msg");
    e.textContent = m; e.setAttribute("data-kind", kind || "");
  }
  function showTooltip(hits, evt) {
    if (!hits.length) { hideTooltip(); return; }
    tooltip.innerHTML = "";
    hits.forEach(t => {
      const row = document.createElement("div"); row.className = "tt-row";
      const name = document.createElement("span"); name.className = "tt-name"; name.textContent = t.name;
      const cat = document.createElement("span"); cat.className = "tt-cat"; cat.textContent = t.category;
      row.appendChild(name); row.appendChild(cat);
      tooltip.appendChild(row);
    });
    tooltip.classList.add("show");
    const wrap = document.querySelector(".map-wrap").getBoundingClientRect();
    let x = evt.clientX - wrap.left + 16;
    let y = evt.clientY - wrap.top + 16;
    const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
    if (x + tw > wrap.width) x = evt.clientX - wrap.left - tw - 16;
    if (y + th > wrap.height) y = evt.clientY - wrap.top - th - 16;
    tooltip.style.transform = `translate(${Math.max(0, x)}px, ${Math.max(0, y)}px)`;
  }
  function hideTooltip() { tooltip.classList.remove("show"); }

  // ---------- Révision (rappel espacé) et erreurs du tour ----------
  function startDueReview() {
    const due = dueItems(currentInsee);
    if (!due.length) return;
    roundMode = "review"; roundMistakes = [];
    resetSession(); queue = shuffle(due.slice()); qi = 0; found = 0; totalRound = queue.length;
    updateCounters(); next();
  }
  function startMistakesReview() {
    if (!roundMistakes.length) return;
    const missed = roundMistakes.slice();
    closeModal();
    roundMode = "mistakes"; roundMistakes = [];
    resetSession(); queue = shuffle(missed); qi = 0; found = 0; totalRound = queue.length;
    updateCounters(); next();
  }
  function updateDueBadge() {
    const btn = document.getElementById("review-btn");
    const n = dueCount();
    btn.querySelector(".badge-count").textContent = n;
    btn.disabled = n === 0;
    btn.classList.toggle("is-empty", n === 0);
  }

  // ---------- Modale (fin de tour / stats / historique) ----------
  let modalView = null; // "summary" | "stats" | "history" | null
  function openModal(view) {
    modalView = view;
    document.getElementById("modal-overlay").classList.add("show");
    renderModal();
  }
  function closeModal() {
    modalView = null;
    document.getElementById("modal-overlay").classList.remove("show");
  }
  function renderModal() {
    const body = document.getElementById("modal-body");
    if (modalView === "summary") body.innerHTML = renderSummaryView();
    else if (modalView === "stats") body.innerHTML = renderStatsView();
    else if (modalView === "history") body.innerHTML = renderHistoryView();
  }
  const MODE_LABELS = { training: "Tour terminé", review: "Révision terminée", mistakes: "Erreurs revues" };
  function renderSummaryView() {
    const s = lastSummary || { mode: "training", total: 0, found: 0, errors: 0, insee: currentInsee };
    const meta = ARRONDISSEMENTS.find(a => a.insee === s.insee);
    return `
      <div class="modal-h">${escapeHtml(MODE_LABELS[s.mode] || "Tour terminé")}${meta ? " — " + escapeHtml(meta.label) : ""}</div>
      <div class="modal-score">${s.found} / ${s.total} trouvés</div>
      <div class="modal-sub">${s.errors} erreur${s.errors > 1 ? "s" : ""}</div>
      <div class="modal-actions">
        <button onclick="RUES.playAgain()">Rejouer</button>
        <button onclick="RUES.otherArr()">Autre arrondissement</button>
        <button onclick="RUES.reviewMistakes()" ${s.errors === 0 ? "disabled" : ""}>Réviser les erreurs</button>
        <button onclick="RUES.viewSolution()">Voir la solution</button>
      </div>`;
  }
  function arrStats(insee) {
    const isLoaded = insee === currentInsee;
    const total = isLoaded ? targets.length : null;
    const bucket = PROGRESS.items[insee] || {};
    const records = Object.values(bucket);
    const attempted = records.filter(r => r.attempts > 0).length;
    const scheduled = records.filter(r => r.box >= 1).length;
    const solid = records.filter(r => isGraduated(r)).length;
    return { total, attempted, scheduled, solid, untouched: total !== null ? total - attempted : null };
  }
  function renderStatsView() {
    const blocks = ARRONDISSEMENTS.filter(a => a.insee === currentInsee || PROGRESS.items[a.insee]).map(a => {
      const st = arrStats(a.insee);
      const pc = n => st.total ? Math.round(100 * n / st.total) : 0;
      const metaTxt = st.total !== null
        ? `${st.solid} solides · ${st.scheduled} en révision · ${st.untouched} non vues`
        : `${st.attempted} tentées`;
      const bar = st.total !== null
        ? `<div class="cnt-bar" style="height:8px;display:flex;overflow:hidden">
             <i style="width:${pc(st.solid)}%;background:var(--ok)"></i>
             <i style="width:${pc(st.scheduled)}%;background:var(--accent)"></i>
           </div>`
        : "";
      return `<div class="stat-block">
        <div class="stat-block-head"><b>${escapeHtml(a.label)}</b><span class="meta">${metaTxt}</span></div>
        ${bar}
      </div>`;
    }).join("") || `<div class="hist-empty">Aucune donnée pour l'instant.</div>`;

    const rows = [];
    Object.keys(PROGRESS.items).forEach(insee => {
      Object.keys(PROGRESS.items[insee]).forEach(name => {
        const rec = PROGRESS.items[insee][name];
        if ((rec.misses || 0) > 0) rows.push({ insee, name, misses: rec.misses, box: rec.box });
      });
    });
    rows.sort((a, b) => b.misses - a.misses);
    const hardest = rows.slice(0, 20);
    const hardRows = hardest.length ? hardest.map(r => {
      const meta = ARRONDISSEMENTS.find(a => a.insee === r.insee);
      return `<tr>
        <td>${escapeHtml(r.name)}</td>
        <td style="color:var(--panel-dim)">${meta ? escapeHtml(meta.label) : escapeHtml(r.insee)}</td>
        <td>${r.misses} raté${r.misses > 1 ? "s" : ""}${r.box >= 1 ? " · en révision" : ""}</td>
      </tr>`;
    }).join("") : `<tr><td colspan="3" class="hist-empty">Aucun raté pour l'instant.</td></tr>`;

    const meta = ARRONDISSEMENTS.find(a => a.insee === currentInsee);
    return `
      <div class="modal-h">Stats</div>
      ${blocks}
      <div class="modal-section modal-h">Cibles les plus difficiles</div>
      <table class="hardest-table"><tbody>${hardRows}</tbody></table>
      <div class="hist-footer">
        <button onclick="RUES.resetArr()">Réinitialiser la mémorisation${meta ? " — " + escapeHtml(meta.label) : ""}</button>
      </div>`;
  }
  function fmtDate(ts) {
    const d = new Date(ts);
    const p = n => String(n).padStart(2, "0");
    return `${p(d.getDate())}/${p(d.getMonth() + 1)} ${p(d.getHours())}:${p(d.getMinutes())}`;
  }
  function renderHistoryView() {
    const games = (PROGRESS.games || []).slice().sort((a, b) => b.ts - a.ts);
    const modeLabel = { training: "Entraînement", review: "Révision", mistakes: "Erreurs" };
    const rows = games.length ? games.map(g => {
      const meta = ARRONDISSEMENTS.find(a => a.insee === g.insee);
      return `<div class="hist-row">
        <span class="hist-date">${fmtDate(g.ts)}</span>
        <span>${meta ? escapeHtml(meta.label) : escapeHtml(g.insee || "—")}</span>
        <span class="hist-mode">${modeLabel[g.mode] || escapeHtml(g.mode)}</span>
        <span class="hist-score">${g.found}/${g.total} · ${g.pct}%</span>
      </div>`;
    }).join("") : `<div class="hist-empty">Aucune partie enregistrée pour l'instant.</div>`;
    return `
      <div class="modal-h">Historique</div>
      ${rows}
      <div class="hist-footer">
        <button onclick="RUES.exportHistory()">Exporter</button>
        <label class="btn-file"><input type="file" accept="application/json,.json" style="display:none" onchange="RUES.importHistory(this.files[0]); this.value='';">Importer</label>
        <button onclick="RUES.clearHistory()">Tout effacer</button>
      </div>`;
  }
  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  // ---------- Interactions ----------
  function svgPoint(evt) {
    const ctm = svg.getScreenCTM();
    if (!ctm) { const r = svg.getBoundingClientRect(); return [(evt.clientX - r.left) / r.width * DW, (evt.clientY - r.top) / r.height * DH]; }
    const pt = svg.createSVGPoint(); pt.x = evt.clientX; pt.y = evt.clientY;
    const p = pt.matrixTransform(ctm.inverse());
    return [p.x, p.y];
  }
  const HIT = 16;
  function sessionClassOf(t) {
    // couleur persistante du tour en cours : vert trouvé, rouge raté, sinon neutre
    if (t._sess === "ok") return "ok";
    if (t._sess === "err") return "err";
    return "";
  }
  function clearHi() { hi.forEach(t => setClass(t, sessionClassOf(t))); hi = []; }
  function sameSet(a, b) { if (a.length !== b.length) return false; for (const t of a) if (b.indexOf(t) < 0) return false; return true; }
  function candidates(mx, my) {
    const pool = activePool().filter(t => t.kind === current.kind);
    if (current.kind === "poi") {
      const inside = pool.filter(t => t.dist(mx, my) === 0);
      if (inside.length) return inside;            // lieux superposés : on les prend tous
    }
    let best = null, bd = Infinity;
    for (const t of pool) { const d = t.dist(mx, my); if (d < bd) { bd = d; best = t; } }
    return (best && bd <= HIT) ? [best] : [];
  }
  function solutionCandidates(mx, my) {
    // Ne propose que les cibles visibles sous le filtre palier courant (les axes masqués
    // ne doivent être ni survolés ni listés dans l'info-bulle). Les POIs restent toujours visibles.
    return targets.filter(t => (t.kind !== "axe" || solutionTier === "AB" || t.tier === solutionTier)
                               && t.dist(mx, my) <= HIT);
  }
  function onMove(evt) {
    const [mx, my] = svgPoint(evt);
    if (solutionMode) {
      const cand = solutionCandidates(mx, my);
      if (!sameSet(cand, hi)) {
        clearHi();
        cand.forEach(t => setClass(t, "hi"));
        hi = cand;
      }
      svg.style.cursor = cand.length ? "pointer" : "default";
      showTooltip(cand, evt);
      return;
    }
    if (busy || !current) return;
    const cand = candidates(mx, my);
    if (sameSet(cand, hi)) return;
    clearHi();
    cand.forEach(t => setClass(t, "hi"));
    hi = cand;
    svg.style.cursor = cand.length ? "pointer" : "default";
  }
  function terminalMiss(target, reason) {
    // Un clic faux ou "Je ne sais pas" met fin à la question pour ce tour : pas de retry,
    // ça compte comme une erreur (voir HANDOFF.md / requirement du tour terminé).
    busy = true; clearHi();
    applyGrade(currentInsee, target.name, "miss");
    roundMistakes.push(target);
    target._sess = "err";
    setClass(target, "reveal");   // pulse rouge pour révéler l'emplacement, puis rouge fixe
    setMsg(reason === "idk" ? "C’était : " + target.name : "Raté. C’était : " + target.name, "err");
    updateCounters();
    const t = target;
    setTimeout(() => { setClass(t, sessionClassOf(t)); qi++; busy = false; hi = []; next(); }, 2200);
  }
  function onClick() {
    if (solutionMode) return;
    if (busy || !current || !hi.length) return;
    if (hi.indexOf(current) >= 0) {
      busy = true;
      found++; applyGrade(currentInsee, current.name, "clean");
      current._sess = "ok";
      hi.forEach(t => { if (t !== current) setClass(t, sessionClassOf(t)); });
      setClass(current, "ok"); setMsg("Trouvé.", "ok"); updateCounters();
      const cur = current;
      setTimeout(() => { setClass(cur, sessionClassOf(cur)); qi++; busy = false; hi = []; next(); }, 480);
    } else {
      terminalMiss(current, "wrong");
    }
  }
  function onIDK() {
    if (solutionMode || busy || !current) return;
    terminalMiss(current, "idk");
  }
  function applyTierFilter() {
    // Le filtre palier n'agit qu'en mode solution ; hors mode solution tout le réseau est affiché.
    if (svg) svg.dataset.tier = solutionMode ? solutionTier : "AB";
  }
  function setSolutionMode(on) {
    solutionMode = on;
    document.getElementById("solution-toggle").setAttribute("data-on", on ? "1" : "0");
    document.getElementById("tier-filter").hidden = !on;
    applyTierFilter();
    clearHi(); hi = []; hideTooltip(); svg.style.cursor = "default";
    if (on) {
      setMsg("");
      document.getElementById("prompt-kind").textContent = "Mode solution";
      document.getElementById("prompt-name").textContent = "Survolez la carte";
      document.getElementById("prompt-cat").textContent = "";
    } else if (current) {
      showPrompt(current);
    } else if (queue.length && qi >= queue.length) {
      openModal("summary");
    } else {
      showPrompt(null);
    }
  }

  // ---------- Compteurs ----------
  const AXE_CATS = ["Boulevard", "Avenue", "Rue", "Place", "Quai", "Pont"];
  const POI_CATS = ["Quartiers", "Parcs", "Piscines", "Sport", "Cinémas", "Culture & institutions", "Commerces", "Transport", "Santé"];
  function updateCounters() {
    const pool = activePool();
    const box = document.getElementById("counters");
    box.innerHTML = "";
    const groups = [["Voies", AXE_CATS, "axe"], ["Lieux", POI_CATS, "poi"]];
    groups.forEach(([label, cats, kind]) => {
      const head = document.createElement("div"); head.className = "cnt-head"; head.textContent = label; box.appendChild(head);
      cats.forEach(cat => {
        const items = pool.filter(t => t.kind === kind && t.category === cat);
        if (!items.length) return;
        const foundCat = items.filter(t => t._sess === "ok").length;   // trouvés ce tour-ci
        const pct = Math.round(foundCat / items.length * 100);
        const row = document.createElement("div"); row.className = "cnt-row";
        row.innerHTML = `<span class="cnt-label">${cat}</span>`
          + `<span class="cnt-bar"><i style="width:${pct}%"></i></span>`
          + `<span class="cnt-num">${foundCat}/${items.length}</span>`;
        box.appendChild(row);
      });
    });
    updateDueBadge();
  }

  // ---------- Sélection d'arrondissement ----------
  function populateSelector() {
    const sel = document.getElementById("arr-select");
    ARRONDISSEMENTS.forEach(a => {
      const opt = document.createElement("option");
      opt.value = a.insee; opt.textContent = a.label;
      sel.appendChild(opt);
    });
    sel.addEventListener("change", function () { selectArrondissement(this.value); });
  }
  function selectArrondissement(insee) {
    const meta = ARRONDISSEMENTS.find(a => a.insee === insee);
    document.getElementById("arr-select").value = insee;
    loadArrondissement(insee, function (data) {
      currentInsee = insee;
      DATA = data;
      document.title = "Plan Vierge — " + meta.label + " arrondissement";
      document.querySelector(".map-wrap").dataset.arr = meta.label;
      setupProjection(); buildTargets(); renderSVG();
      startRound();
    });
  }

  // ---------- Init ----------
  function init() {
    svg = document.getElementById("map");
    tooltip = document.getElementById("tooltip");
    svg.addEventListener("mousemove", onMove);
    svg.addEventListener("click", onClick);
    svg.addEventListener("mouseleave", function () {
      if (!solutionMode) return;
      clearHi(); hi = []; hideTooltip(); svg.style.cursor = "default";
    });
    document.getElementById("idk").addEventListener("click", onIDK);
    document.getElementById("restart").addEventListener("click", function () { startRound(); });
    document.getElementById("solution-toggle").addEventListener("click", function () { setSolutionMode(!solutionMode); });
    document.querySelectorAll("#tier-filter .tf-seg button").forEach(function (b) {
      b.addEventListener("click", function () {
        solutionTier = b.dataset.tier;
        document.querySelectorAll("#tier-filter .tf-seg button").forEach(function (x) { x.classList.toggle("on", x === b); });
        applyTierFilter();
        clearHi(); hi = []; hideTooltip();
      });
    });
    document.getElementById("review-btn").addEventListener("click", startDueReview);
    document.getElementById("stats-btn").addEventListener("click", function () { openModal("stats"); });
    document.getElementById("history-btn").addEventListener("click", function () { openModal("history"); });
    document.getElementById("modal-close").addEventListener("click", closeModal);
    document.getElementById("modal-overlay").addEventListener("click", function (e) { if (e.target === this) closeModal(); });
    document.addEventListener("keydown", function (e) { if (e.key === "Escape" && modalView) closeModal(); });
    populateSelector();
    selectArrondissement(ARRONDISSEMENTS[0].insee);
  }
  window.RUES = {
    playAgain() { closeModal(); startRound(); },
    otherArr() {
      closeModal();
      const sel = document.getElementById("arr-select");
      try { sel.showPicker(); } catch (e) { sel.focus(); }
    },
    reviewMistakes: startMistakesReview,
    viewSolution() { closeModal(); setSolutionMode(true); },
    resetArr() {
      if (!confirm("Effacer la progression mémorisée pour cet arrondissement ? (n'affecte pas le tour en cours)")) return;
      delete PROGRESS.items[currentInsee];
      saveProgress(PROGRESS);
      updateCounters(); renderModal();
    },
    exportHistory,
    importHistory,
    clearHistory
  };
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init); else init();
})();

</script>
</body>
</html>
